<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#fff;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HOME */

.home-icon{font-size:52px;margin-bottom:12px}

.home-sub{color:#999;font-size:14px;margin-top:6px}
.lang-toggle{display:flex;background:#f5f5f5;border-radius:12px;padding:4px;margin:28px 0 8px;border:1px solid #e5e5e5}
.lang-btn{padding:8px 28px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit;transition:all 0.2s}
.lang-btn.active{background:#1a1a1a;color:white}
.lang-btn.inactive{background:transparent;color:#666}
.select-label{color:#999;font-size:13px;margin-bottom:14px}

.class-btn{width:90px;height:90px;border-radius:18px;border:1.5px solid #e5e5e5;background:#fff;color:#1a1a1a;font-size:28px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:all 0.2s;font-family:inherit}
.class-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,0.12);transform:translateY(-2px)}
.class-btn span{font-size:10px;color:#999;font-weight:500}
.home-footer{color:#ddd;font-size:11px;letter-spacing:1px}

/* HEADER */
.header{padding:12px 16px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;background:#fff;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:8px}
.back-btn{background:none;border:none;color:#666;font-size:18px;cursor:pointer}
.header-title{font-weight:700;font-size:16px;color:#1a1a1a}
.class-badge{background:#f5f5f5;color:#666;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.header-right{display:flex;gap:8px;align-items:center}
.lang-switch{background:#f5f5f5;border:1px solid #e5e5e5;border-radius:8px;padding:4px 10px;color:#666;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.counter-box{border:1px solid #e5e5e5;border-radius:8px;padding:4px 10px;text-align:center}
.counter-num{color:#1a1a1a;font-size:14px;font-weight:800;line-height:1}
.counter-label{color:#999;font-size:9px}

/* PROGRESS */
.progress{height:3px;background:#f5f5f5}
.progress-bar{height:100%;background:#1a1a1a;transition:width 0.5s}

/* TABS */
.tabs{display:flex;border-bottom:1px solid #e5e5e5;background:#fff}
.tab-btn{flex:1;padding:11px 4px;border:none;background:none;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;font-family:inherit;color:#999}
.tab-btn.active{color:#1a1a1a;font-weight:700;border-bottom:2px solid #1a1a1a}

/* CHAT */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;min-height:52vh;max-height:55vh}
.welcome{text-align:center;padding:24px 0}
.welcome-icon{font-size:36px;margin-bottom:8px}
.welcome-title{color:#1a1a1a;font-weight:700;font-size:15px}
.welcome-sub{color:#999;font-size:12px;margin-top:4px}
.sample-btns{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.sample-btn{background:#f9f9f9;border:1px solid #e5e5e5;border-radius:10px;padding:10px 14px;color:#1a1a1a;font-size:13px;text-align:left;cursor:pointer;font-family:inherit}
.msg{display:flex;flex-direction:column}
.msg.user{align-self:flex-end;max-width:85%}
.msg.ai{align-self:flex-start;max-width:85%}
.bubble{padding:10px 14px;font-size:14px;line-height:1.7;white-space:pre-wrap;border-radius:18px}
.msg.user .bubble{background:#1a1a1a;color:white;border-radius:18px 18px 4px 18px}
.msg.ai .bubble{background:#f9f9f9;color:#1a1a1a;border:1px solid #e5e5e5;border-radius:18px 18px 18px 4px}

.dot{width:7px;height:7px;border-radius:50%;background:#999;animation:bounce 1.2s infinite}

/* INPUT */

.input-box{flex:1;background:#f9f9f9;border:1px solid #e5e5e5;border-radius:12px;padding:8px 12px;color:#1a1a1a;font-size:14px;resize:none;outline:none;font-family:inherit}
.input-box:focus{border-color:#1a1a1a}
.send-btn{background:#1a1a1a;border:none;border-radius:12px;width:42px;height:42px;color:white;font-size:16px;cursor:pointer;flex-shrink:0}
.send-btn:disabled{background:#e5e5e5;cursor:not-allowed}

/* MCQ / PYQ / ANALYSIS */
.tab-content{flex:1;overflow-y:auto;padding:16px}
.form-label{color:#666;font-size:12px;font-weight:600;display:block;margin-bottom:6px}
.form-select{width:100%;background:#f9f9f9;border:1px solid #e5e5e5;border-radius:10px;padding:10px 12px;color:#1a1a1a;font-size:14px;outline:none;margin-bottom:16px;font-family:inherit}

/* SCORE */

/* ANALYSIS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:#f9f9f9;border:1px solid #e5e5e5;border-radius:12px;padding:14px;text-align:center}
.stat-icon{font-size:22px}
.stat-val{color:#1a1a1a;font-size:22px;font-weight:800;margin-top:4px}

.no-data{text-align:center;padding:40px}
.no-data-icon{font-size:36px}
.no-data-text{color:#999;margin-top:8px;font-size:14px}
.section-title{font-size:13px;font-weight:700;margin-bottom:10px}
.section-title.weak{color:#e53e3e}
.section-title.strong{color:#38a169}
.area-card{border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.area-card.weak{background:#fff5f5;border:1px solid #fed7d7}
.area-card.strong{background:#f0fff4;border:1px solid #c6f6d5}
.area-name{color:#1a1a1a;font-size:13px}
.area-badge{font-size:12px;font-weight:700;border-radius:6px;padding:2px 8px}
.area-badge.weak{color:#e53e3e}
.area-badge.strong{color:#38a169}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#e5e5e5;border-radius:4px}
</style>

<script>
// ══════════════════════════════════════

const GEMINI_KEY = "AIzaSyA2Acr1j48NtS74Wa0x-xtTCPRCsKS_ZB4";

// ══════════════════════════════════════

const CHAPTERS = {

  10:{hi:["Photosynthesis kya hai?","Ohm ka niyam batao","DNA kya hota hai?"],en:["What is Photosynthesis?","Explain Ohm's Law","What is DNA?"]},
  11:{hi:["Newton ke niyam batao","Boyle's law samjhao","Aufbau principle kya hai?"],en:["Explain Newton's Laws","What is Boyle's Law?","What is Aufbau Principle?"]},
  12:{hi:["Faraday ka niyam batao","Half life kya hai?","Electrochemistry samjhao"],en:["Explain Faraday's Law","What is Half Life?","Explain Electrochemistry"]}
};

const T = {
  hi:{
    subtitle:"Board Science AI Tutor",selectClass:"अपनी Class चुनो",
    chat:"💬 Chat",mcq:"📝 MCQ",pyq:"📜 PYQ",analysis:"📊",
    remaining:"bache",placeholder:"Koi bhi Science sawaal poochho...",
    welcomeTitle:"Koi bhi sawaal poochho",welcomeSub:"NCERT • No Web Search",
    blockedTitle:"Free limit khatam!",watchAd:"📺 Ad Dekho (+3)",subscribe:"⭐ ₹49/month",
    adClaim:"🎉 +3 Sawaal Claim Karo!",
    chapterLabel:"Chapter",countLabel:"Kitne MCQ?",generateBtn:"⚡ MCQ Generate Karo",
    generating:"Generate ho raha hai...",back:"← Back",submitBtn:"✓ Submit",
    retryBtn:"🔄 Dobara Karo",showAns:"👁 Answer Dekho",
    pyqFetch:"🔍 PYQ Khojo",fetching:"Khoj raha hai...",lastYears:"Pichle kitne saal?",

    statAsked:"Sawaal Poochhe",statMCQ:"MCQ Solve",statCorrect:"Sahi Jawab",statAcc:"Accuracy",
    weak:"📉 Weak Areas",strong:"📈 Strong Areas",
    mcqError:"MCQ generate nahi hua. Dobara try karo.",
    pyqError:"PYQ load nahi hua. Dobara try karo.",
    serverError:"Server error. Dobara try karo."
  },
  en:{
    subtitle:"Board Science AI Tutor",selectClass:"Select Your Class",
    chat:"💬 Chat",mcq:"📝 MCQ",pyq:"📜 PYQ",analysis:"📊",
    remaining:"left",placeholder:"Ask any Science question...",
    welcomeTitle:"Ask any question",welcomeSub:"NCERT • No Web Search",
    blockedTitle:"Free limit over!",watchAd:"📺 Watch Ad (+3)",subscribe:"⭐ ₹49/month",
    adClaim:"🎉 Claim +3 Questions!",
    chapterLabel:"Chapter",countLabel:"How many MCQs?",generateBtn:"⚡ Generate MCQ",
    generating:"Generating...",back:"← Back",submitBtn:"✓ Submit",
    retryBtn:"🔄 Try Again",showAns:"👁 Show Answer",
    pyqFetch:"🔍 Find PYQ",fetching:"Searching...",lastYears:"Last how many years?",
    noData:"No data yet — solve MCQs!",
    statAsked:"Questions Asked",statMCQ:"MCQ Solved",statCorrect:"Correct",statAcc:"Accuracy",
    weak:"📉 Weak Areas",strong:"📈 Strong Areas",
    mcqError:"Could not generate MCQ. Try again.",
    pyqError:"Could not load PYQ. Try again.",
    serverError:"Server error. Please try again."
  }
};

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let state = {
  screen:"home", cls:null, lang:"hi", tab:"chat",
  messages:[], question:"", chatLoading:false,
  used:0, bonus:0, LIMIT:15,
  showAd:false, adTimer:5, adDone:false,
  mcqChapter:"", mcqCount:20, mcqs:[], mcqLoading:false,
  mcqAnswers:{}, mcqScore:null, mcqError:"",
  pyqChapter:"", pyqYears:5, pyqs:[], pyqLoading:false,
  pyqRevealed:{}, pyqError:"",
  weakMap:{}, strongMap:{},
  totalAsked:0, totalMCQ:0, totalCorrect:0
};

function setState(partial){ state = {...state,...partial}; render(); }
function remaining(){ return Math.max(0, state.LIMIT + state.bonus - state.used); }
function isBlocked(){ return remaining() <= 0; }
function t(){ return T[state.lang]; }
function ch(){ return state.cls ? CHAPTERS[state.cls] : []; }

// ══════════════════════════════════════
// GEMINI API
// ══════════════════════════════════════
async function callGemini(prompt, useWeb=false){
  const model = useWeb ? GEMINI_MODEL_WEB : GEMINI_MODEL_CHAT;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_KEY}`;
  const body = { contents:[{ parts:[{ text:prompt }] }] };
  if(useWeb) body.tools = [{ google_search:{} }];
  const res = await fetch(url,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data?.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("") || "";
}

// ══════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════
function initClass(c){
  setState({ cls:c, screen:"app", tab:"chat", messages:[],
    mcqChapter:CHAPTERS[c][0], pyqChapter:CHAPTERS[c][0] });
}

async function sendChat(){
  const q = state.question.trim();
  if(!q || state.chatLoading || isBlocked()) return;
  const msgs = [...state.messages, {role:"user",text:q}];
  setState({ messages:msgs, question:"", chatLoading:true,
    used:state.used+1, totalAsked:state.totalAsked+1 });
  try{
    const lang = state.lang;
    const cls = state.cls;
    const prompt = lang === "hi"
      ? `Tum BoardGPT ke expert Science teacher ho.
Rules:
- Sirf Class ${cls} NCERT Science ke sawaalon ka jawab do
- Agar Science ke alawa kuch pucha jaye to bolو: "Maaf karo, main sirf Science ke sawaalon ka jawab de sakta hun."
- Sirf NCERT syllabus se answer do — web search bilkul nahi
- Hamesha HINDI mein jawab do
- Short answer do (2-3 lines) jab tak user "detail mein" ya "explain karo" na kahe
- End mein: 💡 Yaad rakho: [ek key point]

Sawaal: ${q}`
      : `You are BoardGPT, an expert Science teacher.
Rules:
- Only answer Class ${cls} NCERT Science questions
- If asked anything other than Science, say: "Sorry, I can only answer Science questions."
- Answer only from NCERT syllabus — no web search
- Always answer in ENGLISH
- Give short answers (2-3 lines) unless user asks to "explain in detail"
- End with: 💡 Remember: [one key point]

Question: ${q}`;
    const text = await callGemini(prompt, false);
    setState({ messages:[...msgs,{role:"ai",text}], chatLoading:false });
  } catch(e){
    setState({ messages:[...msgs,{role:"ai",text:t().serverError}], chatLoading:false });
  }
}

async function generateMCQ(){
  const chapter = state.mcqChapter;
  const count = state.mcqCount;
  const cls = state.cls;
  const lang = state.lang;
  if(!chapter) return;
  setState({ mcqs:[], mcqAnswers:{}, mcqScore:null, mcqError:"", mcqLoading:true });
  try{
    const prompt = `You are a Bihar Board Class ${cls} Science expert.
Generate exactly ${count} MCQ questions on "${chapter}" from NCERT syllabus only. No web search.
Language for explanations: ${lang === "hi" ? "Hindi" : "English"}

Return ONLY valid JSON, no markdown, no extra text:
{"mcqs":[{"q":"question text","a":"Option A","b":"Option B","c":"Option C","d":"Option D","ans":"a","exp":"brief explanation"}]}`;
    const text = await callGemini(prompt, false);
    const match = text.match(/\{[\s\S]*\}/);
    if(!match) throw new Error("no json");
    const parsed = JSON.parse(match[0]);
    if(!parsed.mcqs?.length) throw new Error("empty");
    setState({ mcqs:parsed.mcqs, mcqLoading:false });
  } catch(e){
    setState({ mcqError:t().mcqError, mcqLoading:false });
  }
}

function selectOpt(i, opt){
  setState({ mcqAnswers:{...state.mcqAnswers,[i]:opt} });
}

function submitMCQ(){
  let correct=0;
  state.mcqs.forEach((m,i)=>{ if(state.mcqAnswers[i]===m.ans) correct++; });
  const ratio = correct/state.mcqs.length;
  const ch = state.mcqChapter;
  setState({
    mcqScore:{correct,total:state.mcqs.length},
    totalMCQ:state.totalMCQ+state.mcqs.length,
    totalCorrect:state.totalCorrect+correct,
    strongMap: ratio>=0.6 ? {...state.strongMap,[ch]:(state.strongMap[ch]||0)+1} : state.strongMap,
    weakMap:   ratio<0.6  ? {...state.weakMap,[ch]:(state.weakMap[ch]||0)+1}   : state.weakMap
  });
}

async function fetchPYQ(){
  const chapter = state.pyqChapter;
  const years = state.pyqYears;
  const cls = state.cls;
  const lang = state.lang;
  if(!chapter) return;
  setState({ pyqs:[], pyqRevealed:{}, pyqError:"", pyqLoading:true });
  try{
    const prompt = `Search and find real Bihar Board Class ${cls} Science previous year exam questions for "${chapter}" from last ${years} years.
Answer language: ${lang === "hi" ? "Hindi" : "English"}

Return ONLY valid JSON, no markdown:
{"pyqs":[{"year":2023,"q":"exact question","marks":2,"ans":"detailed answer","tip":"exam tip"}]}`;
    const text = await callGemini(prompt, true);
    const match = text.match(/\{[\s\S]*\}/);
    if(!match) throw new Error("no json");
    const parsed = JSON.parse(match[0]);
    if(!parsed.pyqs?.length) throw new Error("empty");
    setState({ pyqs:parsed.pyqs, pyqLoading:false });
  } catch(e){
    setState({ pyqError:t().pyqError, pyqLoading:false });
  }
}

function startAd(){
  setState({ showAd:true, adDone:false, adTimer:5 });
  const interval = setInterval(()=>{
    if(state.adTimer<=1){ clearInterval(interval); setState({adDone:true,adTimer:0}); }
    else setState({adTimer:state.adTimer-1});
  },1000);
}

function claimBonus(){ setState({ bonus:state.bonus+3, showAd:false }); }

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render(){
  document.getElementById("app").innerHTML = state.screen==="home" ? renderHome() : renderApp();
  bindEvents();
}

function renderHome(){
  const lang = state.lang;
  return `
<div class="home">
  <div class="home-icon">🎓</div>
  <h1 class="home-title">BoardGPT</h1>
  <p class="home-sub">${T[lang].subtitle}</p>
  <div class="lang-toggle">
    <button class="lang-btn ${lang==='hi'?'active':'inactive'}" onclick="setState({lang:'hi'})">हिंदी</button>
    <button class="lang-btn ${lang==='en'?'active':'inactive'}" onclick="setState({lang:'en'})">English</button>
  </div>
  <p class="select-label">${T[lang].selectClass}</p>
  <div class="class-btns">
    ${[10,11,12].map(c=>`
      <button class="class-btn" onclick="initClass(${c})">
        ${c}<span>Class</span>
      </button>`).join("")}
  </div>
  <p class="home-footer">NCERT</p>
</div>`;
}

function renderApp(){
  const lang = state.lang;
  const cls = state.cls;
  const tab = state.tab;
  const rem = remaining();
  return `
<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="setState({screen:'home'})">←</button>
    <span class="header-title">🎓 BoardGPT</span>
    <span class="class-badge">Class ${cls}</span>
  </div>
  <div class="header-right">
    <button class="lang-switch" onclick="setState({lang:state.lang==='hi'?'en':'hi'})">${lang==='hi'?'EN':'हि'}</button>
    ${tab==='chat'?`<div class="counter-box"><div class="counter-num">${rem}</div><div class="counter-label">${t().remaining}</div></div>`:''}
  </div>
</div>
<div class="progress"><div class="progress-bar" style="width:${Math.min(100,(state.used/(state.LIMIT+state.bonus))*100)}%"></div></div>
<div class="tabs">
  ${[['chat',t().chat],['mcq',t().mcq],['pyq',t().pyq],['analysis',t().analysis]].map(([tb,label])=>
    `<button class="tab-btn ${tab===tb?'active':''}" onclick="setState({tab:'${tb}'})">${label}</button>`
  ).join("")}
</div>
${tab==='chat' ? renderChat() : ''}
${tab==='mcq'  ? renderMCQ()  : ''}
${tab==='pyq'  ? renderPYQ()  : ''}
${tab==='analysis' ? renderAnalysis() : ''}`;
}

function renderChat(){
  const msgs = state.messages;
  const q = state.question;
  const loading = state.chatLoading;
  const blocked = isBlocked();
  return `
<div class="chat-area" id="chatArea">
  ${msgs.length===0 ? `
    <div class="welcome">
      <div class="welcome-icon">⚡</div>
      <div class="welcome-title">${t().welcomeTitle}</div>
      <div class="welcome-sub">Class ${state.cls} • ${t().welcomeSub}</div>
      <div class="sample-btns">
        ${SAMPLES[state.cls][state.lang].map(sq=>`
          <button class="sample-btn" onclick="setState({question:'${sq.replace(/'/g,"\\'")}'})"">💬 ${sq}</button>
        `).join("")}
      </div>
    </div>` : ''}
  ${msgs.map(m=>`
    <div class="msg ${m.role}">
      ${m.role==='ai'?`<div class="ai-name">BoardGPT</div>`:''}
      <div class="bubble">${m.text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
    </div>`).join("")}
  ${loading ? `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>` : ''}
</div>
${blocked && !state.showAd ? `
  <div class="blocked-box">
    <div class="blocked-title">🔒 ${t().blockedTitle}</div>
    <div class="blocked-btns">
      <button class="ad-btn" onclick="startAd()">${t().watchAd}</button>
      <button class="pay-btn">${t().subscribe}</button>
    </div>
  </div>` : ''}
${state.showAd ? `
  <div class="ad-box">
    <div class="ad-label">ADVERTISEMENT</div>
    <div class="ad-inner">
      <div style="font-size:24px">🏫</div>
      <div style="font-weight:700;color:#1a1a1a">Rajesh Coaching Classes</div>
      <div style="color:#999;font-size:12px">Patna • Bihar Board Expert</div>
    </div>
    ${!state.adDone
      ? `<div class="ad-timer">⏱ ${state.adTimer}s</div>`
      : `<button class="claim-btn" onclick="claimBonus()">${t().adClaim}</button>`}
  </div>` : ''}
${!blocked ? `
  <div class="input-area">
    <textarea class="input-box" id="chatInput" rows="2" placeholder="${t().placeholder}">${q}</textarea>
    <button class="send-btn" id="sendBtn" ${loading||!q.trim()?'disabled':''} onclick="sendChat()">▶</button>
  </div>` : ''}`;
}

function renderMCQ(){
  const {mcqs,mcqLoading,mcqError,mcqAnswers,mcqScore,mcqChapter,mcqCount} = state;
  if(mcqLoading) return `<div class="tab-content"><div class="loading-box"><div class="loading-icon">⚡</div><div class="loading-title">${t().generating}</div><div class="loading-sub">${mcqCount} MCQs • ${mcqChapter}</div></div></div>`;
  if(mcqScore) return `
<div class="tab-content">
  <div class="score-box">
    <div class="score-icon">${mcqScore.correct/mcqScore.total>=0.6?'🏆':'📚'}</div>
    <div class="score-num">${mcqScore.correct}/${mcqScore.total}</div>
    <div class="score-pct">${Math.round((mcqScore.correct/mcqScore.total)*100)}% ${state.lang==='hi'?'sahi':'correct'}</div>
  </div>
  ${mcqs.map((m,i)=>`
    <div class="result-card ${mcqAnswers[i]===m.ans?'correct':'wrong'}">
      <div class="result-q">Q${i+1}. ${escHtml(m.q)}</div>
      <div class="result-user ${mcqAnswers[i]===m.ans?'correct':'wrong'}">${mcqAnswers[i]===m.ans?'✅':'❌'} ${escHtml(m[mcqAnswers[i]]||'')}</div>
      ${mcqAnswers[i]!==m.ans?`<div class="result-right">✓ ${escHtml(m[m.ans])}</div>`:''}
      <div class="result-exp">💡 ${escHtml(m.exp)}</div>
    </div>`).join("")}
  <button class="retry-btn" onclick="setState({mcqs:[],mcqAnswers:{},mcqScore:null})">${t().retryBtn}</button>
</div>`;
  if(mcqs.length>0) return `
<div class="tab-content">
  <div class="mcq-header">
    <span class="mcq-info">${mcqs.length} MCQ • ${mcqChapter}</span>
    <button class="back-link" onclick="setState({mcqs:[],mcqError:''})">${t().back}</button>
  </div>
  ${mcqs.map((m,i)=>`
    <div class="mcq-card">
      <div class="mcq-num">Q ${i+1}</div>
      <div class="mcq-q">${escHtml(m.q)}</div>
      ${['a','b','c','d'].map(opt=>`
        <button class="opt-btn ${mcqAnswers[i]===opt?'selected':'unselected'}" onclick="selectOpt(${i},'${opt}')">
          <span class="opt-label">${opt.toUpperCase()}.</span>${escHtml(m[opt]||'')}
        </button>`).join("")}
    </div>`).join("")}
  <button class="submit-btn ${Object.keys(mcqAnswers).length<mcqs.length?'notready':'ready'}" onclick="submitMCQ()" ${Object.keys(mcqAnswers).length<mcqs.length?'disabled':''}>
    ${t().submitBtn} (${Object.keys(mcqAnswers).length}/${mcqs.length})
  </button>
</div>`;
  return `
<div class="tab-content">
  <label class="form-label">${t().chapterLabel}</label>
  <select class="form-select" onchange="setState({mcqChapter:this.value})">
    ${ch().map(c=>`<option value="${c}" ${state.mcqChapter===c?'selected':''}>${c}</option>`).join("")}
  </select>
  <label class="form-label">${t().countLabel}</label>
  <div class="count-btns">
    ${[20,30,40,50].map(n=>`<button class="count-btn ${mcqCount===n?'active':'inactive'}" onclick="setState({mcqCount:${n}})">${n}</button>`).join("")}
  </div>
  ${mcqError?`<div class="error-msg">${mcqError}</div>`:''}
  <button class="main-btn" onclick="generateMCQ()">${t().generateBtn}</button>
</div>`;
}

function renderPYQ(){
  const {pyqs,pyqLoading,pyqError,pyqRevealed,pyqYears} = state;
  return `
<div class="tab-content">
  <label class="form-label">${t().chapterLabel}</label>
  <select class="form-select" onchange="setState({pyqChapter:this.value})">
    ${ch().map(c=>`<option value="${c}" ${state.pyqChapter===c?'selected':''}>${c}</option>`).join("")}
  </select>
  <label class="form-label">${t().lastYears}</label>
  <div class="count-btns" style="margin-bottom:20px">
    ${[3,5,7,10].map(y=>`<button class="count-btn ${pyqYears===y?'active':'inactive'}" onclick="setState({pyqYears:${y}})">${y}yr</button>`).join("")}
  </div>
  ${pyqError?`<div class="error-msg">${pyqError}</div>`:''}
  <button class="main-btn" onclick="fetchPYQ()">${t().pyqFetch}</button>
  ${pyqLoading?`<div class="loading-box"><div class="loading-icon">🔍</div><div class="loading-title">${t().fetching}</div><div class="loading-sub">Bihar Board • ${state.pyqChapter}</div></div>`:''}
  ${pyqs.map((p,i)=>`
    <div class="pyq-card">
      <div class="pyq-header">
        <span class="year-badge">${p.year}</span>
        <span class="marks-label">${p.marks} marks</span>
      </div>
      <div class="pyq-q">${escHtml(p.q)}</div>
      ${!pyqRevealed[i]
        ? `<button class="show-ans-btn" onclick="revealPYQ(${i})">${t().showAns}</button>`
        : `<div class="ans-box">✅ ${escHtml(p.ans)}</div>${p.tip?`<div class="tip-box">💡 ${escHtml(p.tip)}</div>`:''}`}
    </div>`).join("")}
</div>`;
}

function renderAnalysis(){
  const {weakMap,strongMap,totalAsked,totalMCQ,totalCorrect} = state;
  const acc = totalMCQ ? Math.round((totalCorrect/totalMCQ)*100)+"%" : "—";
  const hasData = Object.keys(weakMap).length>0 || Object.keys(strongMap).length>0;
  return `
<div class="tab-content">
  <div class="stats-grid">
    ${[[t().statAsked,totalAsked,"⚡"],[t().statMCQ,totalMCQ,"📝"],[t().statCorrect,totalCorrect,"✅"],[t().statAcc,acc,"🎯"]].map(([label,val,icon])=>`
      <div class="stat-card"><div class="stat-icon">${icon}</div><div class="stat-val">${val}</div><div class="stat-label">${label}</div></div>`).join("")}
  </div>
  ${!hasData ? `<div class="no-data"><div class="no-data-icon">📊</div><div class="no-data-text">${t().noData}</div></div>` : `
    ${Object.keys(weakMap).length>0?`
      <div class="section-title weak">${t().weak}</div>
      ${Object.entries(weakMap).sort((a,b)=>b[1]-a[1]).map(([ch,c])=>`
        <div class="area-card weak"><span class="area-name">${ch}</span><span class="area-badge weak">${c}x</span></div>`).join("")}`:''}
    ${Object.keys(strongMap).length>0?`
      <div class="section-title strong" style="margin-top:16px">${t().strong}</div>
      ${Object.entries(strongMap).sort((a,b)=>b[1]-a[1]).map(([ch,c])=>`
        <div class="area-card strong"><span class="area-name">${ch}</span><span class="area-badge strong">${c}x</span></div>`).join("")}`:''}
  `}
</div>`;
  }
  // ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function escHtml(str){ return (str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function revealPYQ(i){ setState({pyqRevealed:{...state.pyqRevealed,[i]:true}}); }

function bindEvents(){
  const inp = document.getElementById("chatInput");
  if(inp){
    inp.addEventListener("input",e=>{ state.question=e.target.value; });
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();} });
    inp.value = state.question;
    setTimeout(()=>{ const ca=document.getElementById("chatArea"); if(ca) ca.scrollTop=ca.scrollHeight; },50);
  }
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
render();
</script>
</body>
</html>
