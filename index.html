async function loadProfile(u){
  let{data}=await sb.from('user_profiles').select('*').eq('id',u.id).single();
  if(!data){
    const today=new Date().toISOString().split('T')[0];
    const{data:np}=await sb.from('user_profiles').insert({
      id:u.id,email:u.email,is_premium:false,plan:'free',
      usage_chat:0,usage_mcq:0,usage_pyq:0,usage_test:0,usage_predict:0,reset_date:today
    }).select().single();
    S.profile=np;
  }else{
    const today=new Date().toISOString().split('T')[0];
    if(data.reset_date!==today){
      await sb.from('user_profiles').update({usage_chat:0,usage_mcq:0,usage_pyq:0,usage_test:0,usage_predict:0,reset_date:today}).eq('id',u.id);

// ─── AI (via /api/chat — key hidden) ───
// Multi-turn: sends full history for memory!
async function ai(messages){
  const r=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages})
  });
  const d=await r.json();
  if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
  return d?.choices?.[0]?.message?.content||"";
}
async function aiSimple(prompt){
  return ai([{role:"user",content:prompt}]);
}
async function aiJSON(prompt){
  const t=await aiSimple(prompt);
  const m=t.match(/\{[\s\S]*\}/);if(!m) throw new Error("no json");
  return JSON.parse(m[0]);
}

async function sendChat(){
  const q=S.question.trim();
  if(!q||S.loading) return;
  if(!canUse("chat")){set({showPrem:true});return;}

  // Add to history
  S.history=[...S.history,{role:"user",content:q}];
  S.question="";S.loading=true;S.totalAsked++;
  renderChat();updateInput();
  await incUsage("chat");

  try{
    // Build messages with system prompt + full history for memory
    const messages=[
      {role:"system",content:sysPrompt()},
      ...S.history
    ];
    const text=await ai(messages);
    S.history=[...S.history,{role:"assistant",content:text}];
    S.loading=false;renderChat();
  }catch(e){
    S.history=[...S.history,{role:"assistant",content:L()==="hi"?"Server error. Dobara try karein.":"Server error. Please try again."}];
    S.loading=false;renderChat();
  }
}

function submitMCQ(){

  set({mcqScore:{c,total:S.mcqs.length},totalMCQ:S.totalMCQ+S.mcqs.length,totalCorrect:S.totalCorrect+c,
    strongMap:r>=0.6?{...S.strongMap,[ch]:(S.strongMap[ch]||0)+1}:S.strongMap,
    weakMap:r<0.6?{...S.weakMap,[ch]:(S.weakMap[ch]||0)+1}:S.weakMap});
}

async function startTest(){
  if(!S.testCh||!canUse("test")){if(!canUse("test"))set({showPrem:true});return;}
  set({testQs:[],testAns:{},testScore:null,testLoading:true,testRunning:false});
  await incUsage("test");
  try{
    const lang=L()==="hi"?"Hindi":"English";
    const d=await aiJSON(`Generate ${S.testCnt} MCQ on "${S.testCh}" Class ${S.cls} NCERT Science. Explanations in ${lang}.
Return ONLY JSON: {"mcqs":[{"q":"q","a":"A","b":"B","c":"C","d":"D","ans":"a","exp":"explanation","important":false}]}`);
    if(!d.mcqs?.length) throw new Error("empty");
    const secs=S.testCnt*90;
    if(S.testIv) clearInterval(S.testIv);
    const iv=setInterval(()=>{
      if(S.testTimer<=1){clearInterval(iv);submitTest();}
      else{S.testTimer--;const el=document.getElementById("tvl");if(el)el.textContent=fmtT(S.testTimer);}
    },1000);
    set({testQs:d.mcqs,testLoading:false,testRunning:true,testTimer:secs,testIv:iv});
  }catch(e){set({testLoading:false});}
}

function submitTest(){
  if(S.testIv)clearInterval(S.testIv);
  let c=0;S.testQs.forEach((m,i)=>{if(S.testAns[i]===m.ans)c++;});
  const r=c/S.testQs.length,ch=S.testCh;

    totalMCQ:S.totalMCQ+S.testQs.length,totalCorrect:S.totalCorrect+c,

    weakMap:r<0.6?{...S.weakMap,[ch]:(S.weakMap[ch]||0)+1}:S.weakMap});
}

function render(){
  const root=document.getElementById("app");
  if(S.sc==="landing"){root.innerHTML=rLanding();return;}
  if(S.sc==="boardSelect"){root.innerHTML=rBoardSel();return;}
  if(S.sc==="mediumSelect"){root.innerHTML=rMedSel();return;}

  root.innerHTML=rApp();
  // bind chat input
  const inp=document.getElementById("cInp");
  if(inp){
    inp.value=S.question;
    inp.oninput=e=>{S.question=e.target.value;updateInput();};
    inp.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}};
    updateInput();renderChat();
  }
}

    ${S.predErr?`<div class="p-3.5 rounded-xl text-sm mb-4 font-medium" style="background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca">${S.predErr}</div>`:""}
    ${S.predLoading
      ?`<div class="flex items-center justify-center py-10 gap-3"><div class="w-7 h-7 rounded-full spin" style="border:2.5px solid #e0e3e5;border-top-color:#0f172a"></div><span class="text-sm text-[#737686]">${ln==="hi"?"Predict ho raha hai...":"Predicting..."}</span></div>`
      :`<button onclick="runPredictor()" class="w-full py-4 rounded-xl font-bold text-sm text-white btn-primary">🔮 ${ln==="hi"?"Predict Karein":"Run Predictor"}</button>`}
    ${S.prediction?`<div class="card p-5 mt-5 text-sm leading-8 text-[#191c1e]" style="white-space:pre-wrap">${esc(S.prediction).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>`:""}
  </div>`;
}

function rSettings(){
  const ln=L();
  return`<div class="flex-1 overflow-y-auto p-4" style="background:#f7f9fb">
    <div class="text-xs font-bold text-[#737686] uppercase tracking-wider mb-3">Account</div>
    <div class="card overflow-hidden mb-5 bg-white">
      <div class="flex justify-between items-center px-4 py-4 border-b" style="border-color:#e0e3e5"><span class="text-sm font-medium text-[#191c1e]">👤 User</span><span class="text-xs text-[#737686]">${S.user?.email||"Guest"}</span></div>
      <div class="flex justify-between items-center px-4 py-4 border-b" style="border-color:#e0e3e5"><span class="text-sm font-medium text-[#191c1e]">⭐ Plan</span><span class="text-xs font-bold ${isPrem()?"text-[#2563eb]":"text-[#737686]"}">${isPrem()?`${S.profile?.plan||"pro"} — PRO`:"Free"}</span></div>
      ${!isPrem()?`<button onclick="set({showPrem:true})" class="flex justify-between items-center px-4 py-4 w-full text-left border-b" style="border-color:#e0e3e5"><span class="text-sm font-medium text-[#191c1e]">🚀 Upgrade</span><span class="text-xs font-bold text-[#2563eb]">₹49/₹99/₹149 →</span></button>`:""}
      ${!S.user?`<button onclick="gLogin()" class="flex justify-between items-center px-4 py-4 w-full text-left"><span class="text-sm font-medium text-[#191c1e]">🔑 Login</span><span class="text-xs font-bold text-[#2563eb]">Google →</span></button>`:""}
    </div>
    <div class="text-xs font-bold text-[#737686] uppercase tracking-wider mb-3">Study</div>
    <div class="card overflow-hidden mb-5 bg-white">
      <div class="flex justify-between items-center px-4 py-4 border-b" style="border-color:#e0e3e5"><span class="text-sm font-medium text-[#191c1e]">🏫 Board</span><span class="text-xs text-[#737686]">${S.board==="bihar"?"Bihar Board":"CBSE"}</span></div>
      <div class="flex justify-between items-center px-4 py-4 border-b" style="border-color:#e0e3e5"><span class="text-sm font-medium text-[#191c1e]">📚 Class</span><span class="text-xs text-[#737686]">Class ${S.cls}</span></div>
      <div class="flex justify-between items-center px-4 py-4 border-b" style="border-color:#e0e3e5"><span class="text-sm font-medium text-[#191c1e]">🌐 Medium</span><span class="text-xs text-[#737686]">${S.medium==="hi"?"Hindi":"English"}</span></div>
      <button onclick="set({sc:'boardSelect'})" class="flex justify-between items-center px-4 py-4 w-full text-left"><span class="text-sm font-medium text-[#191c1e]">🔄 ${ln==="hi"?"Change Board/Class":"Change Board/Class"}</span><span class="text-xs font-bold text-[#2563eb]">→</span></button>
    </div>
    <div class="text-xs font-bold text-[#737686] uppercase tracking-wider mb-3">Usage Today</div>
    <div class="card overflow-hidden bg-white">
      ${[["💬 Chat","chat"],["📝 MCQ","mcq"],["📜 PYQ","pyq"],["🧪 Test","test"],["🔮 Predictor","predict"]].map(([lb,f],i,arr)=>`
      <div class="flex justify-between items-center px-4 py-4 ${i<arr.length-1?"border-b":"}" style="${i<arr.length-1?"border-color:#e0e3e5":""}">
        <span class="text-sm font-medium text-[#191c1e]">${lb}</span>
        <div class="flex items-center gap-2">
          <div class="w-16 h-1.5 rounded-full" style="background:#e0e3e5"><div class="h-full rounded-full" style="background:${used(f)>=FREE[f]&&!isPrem()?"#dc2626":"#2563eb"};width:${Math.min(100,(used(f)/FREE[f])*100)}%"></div></div>
          <span class="text-xs font-bold ${used(f)>=FREE[f]&&!isPrem()?"text-[#dc2626]":"text-[#737686]"}">${used(f)}/${FREE[f]}</span>
        </div>
      </div>`).join("")}
    </div>
  </div>`;
}

init().then(()=>render());
</script>
</body>
</html>
