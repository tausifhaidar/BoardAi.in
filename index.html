<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BoardAI - Board Exam AI Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#0f172a;overflow-x:hidden}
button,select,textarea{font-family:'Inter',system-ui,sans-serif}
:root{
  --blue:#2563eb;--blue-l:#eff6ff;--blue-b:#bfdbfe;
  --dark:#0f172a;--dark2:#1e293b;--gray:#64748b;
  --light:#f8fafc;--border:#e2e8f0;--border2:#f1f5f9;
  --green:#16a34a;--red:#dc2626;--yellow:#d97706;
}

/* ═══════════════ HOMEPAGE ═══════════════ */
.homepage{min-height:100vh;background:#fff;display:flex;flex-direction:column}
.hp-nav{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2)}
.logo-text{font-size:20px;font-weight:900;letter-spacing:-0.5px}
.logo-text em{color:var(--blue);font-style:normal}
.lang-toggle{display:flex;background:var(--light);border-radius:9px;padding:3px;border:1px solid var(--border)}
.lt-btn{padding:5px 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--gray)}
.lt-btn.on{background:var(--dark);color:#fff}
.hp-hero{padding:28px 20px 20px;text-align:center}
.hp-chip{display:inline-flex;align-items:center;gap:5px;background:var(--blue-l);color:var(--blue);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:700;margin-bottom:14px}
.hp-h1{font-size:27px;font-weight:900;line-height:1.2;letter-spacing:-0.8px;margin-bottom:10px}
.hp-h1 em{color:var(--blue);font-style:normal}
.hp-sub{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:20px}
.hp-cta{width:100%;background:var(--dark);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.hp-free{font-size:11px;color:#94a3b8;margin-top:8px;text-align:center}
.hp-section{padding:0 20px 22px}
.sec-label{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;text-align:center}
.board-grid{display:flex;gap:12px}
.board-card{flex:1;border:1.5px solid var(--border);border-radius:14px;padding:18px 12px;text-align:center;cursor:pointer;transition:all 0.18s}
.board-card:active{border-color:var(--blue);background:var(--blue-l)}
.bc-icon{font-size:26px;margin-bottom:7px}
.bc-name{font-size:15px;font-weight:800}
.bc-sub{font-size:10px;color:var(--gray);margin-top:3px}
.feat-grid{display:flex;flex-direction:column;gap:9px}
.feat-card{display:flex;align-items:center;gap:13px;background:var(--light);border:1px solid var(--border2);border-radius:14px;padding:13px}
.feat-ic{font-size:24px;min-width:32px;text-align:center}
.feat-title{font-size:13px;font-weight:700;margin-bottom:2px}
.feat-desc{font-size:11px;color:var(--gray);line-height:1.4}
.feat-tag-free{font-size:9px;background:var(--blue-l);color:var(--blue);padding:2px 6px;border-radius:4px;font-weight:700;display:inline-block;margin-top:3px}
.feat-tag-pro{font-size:9px;background:#fef3c7;color:var(--yellow);padding:2px 6px;border-radius:4px;font-weight:700;display:inline-block;margin-top:3px}
.step-list{display:flex;flex-direction:column;gap:10px}
.step-row{display:flex;align-items:flex-start;gap:12px}
.step-num{width:26px;height:26px;background:var(--dark);color:#fff;border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-txt{font-size:13px;color:var(--gray);line-height:1.5}
.testi-grid{display:flex;flex-direction:column;gap:8px}
.testi-card{background:var(--light);border:1px solid var(--border2);border-radius:12px;padding:12px 14px}
.testi-text{font-size:13px;line-height:1.5;margin-bottom:5px}
.testi-auth{font-size:11px;color:var(--gray);font-weight:600}
.price-row{display:inline-flex;gap:8px;background:var(--light);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:13px;margin-bottom:5px}
.price-note{font-size:11px;color:#94a3b8}

/* ═══════════════ SELECT PAGES ═══════════════ */
.select-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:#fff}
.sel-back{display:flex;align-items:center;gap:6px;color:var(--gray);font-size:13px;cursor:pointer;align-self:flex-start;border:1px solid var(--border);border-radius:9px;padding:6px 12px;background:var(--light);margin-bottom:24px;font-weight:500}
.sel-label{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin:16px 0 14px;text-align:center}
.sel-cards{display:flex;gap:12px;width:100%}
.sel-card{flex:1;border:1.5px solid var(--border);border-radius:14px;padding:22px 12px;text-align:center;cursor:pointer;transition:all 0.18s}
.sel-card:active{border-color:var(--blue);background:var(--blue-l)}
.sel-card .si{font-size:30px;margin-bottom:9px}
.sel-card .sn{font-size:15px;font-weight:800}
.sel-card .ss{font-size:11px;color:var(--gray);margin-top:3px}
.cls-cards{display:flex;gap:14px}
.cls-card{width:88px;height:88px;border:1.5px solid var(--border);border-radius:18px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.18s;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.cls-card:active{border-color:var(--blue);background:var(--blue-l)}
.cls-num{font-size:30px;font-weight:900}
.cls-lbl{font-size:9px;color:#94a3b8;font-weight:700;letter-spacing:1px}

/* ═══════════════ APP LAYOUT ═══════════════ */
.app-layout{display:flex;height:100vh;background:#fff;position:relative;overflow:hidden}
.side-menu{width:240px;height:100vh;background:var(--dark);display:flex;flex-direction:column;position:absolute;left:0;top:0;z-index:200;transform:translateX(-240px);transition:transform 0.25s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 20px rgba(0,0,0,0.3)}
.side-menu.open{transform:translateX(0)}
.sm-header{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sm-logo{display:flex;align-items:center;gap:8px}
.sm-logo-text{font-size:17px;font-weight:900;color:#fff;letter-spacing:-0.3px}
.sm-logo-text em{color:#60a5fa;font-style:normal}
.sm-meta{font-size:10px;color:#94a3b8;margin-top:3px}
.sm-user{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px}
.sm-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sm-user-name{font-size:11px;color:#e2e8f0;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sm-plan-badge{font-size:8px;padding:2px 5px;border-radius:4px;font-weight:700}
.sm-plan-badge.free{background:rgba(255,255,255,0.1);color:#94a3b8}
.sm-plan-badge.premium{background:#fbbf24;color:#1a1a1a}
.sm-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.sm-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;color:rgba(255,255,255,0.55);font-size:13px;font-weight:500;font-family:inherit}
.sm-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
.sm-item.active{background:rgba(96,165,250,0.18);color:#fff;font-weight:600}
.sm-item-icon{font-size:17px;min-width:22px;text-align:center}
.sm-divider{height:1px;background:rgba(255,255,255,0.07);margin:8px 0}
.sm-footer{padding:12px 8px 16px;display:flex;flex-direction:column;gap:8px}
.sm-upgrade-btn{width:100%;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:10px;padding:11px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.sm-logout-btn{width:100%;background:rgba(255,255,255,0.07);border:none;border-radius:10px;padding:9px;color:#94a3b8;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:199}
.menu-overlay.show{display:block}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;width:100%}

/* ═══════════════ TOPBAR ═══════════════ */
.topbar{padding:10px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;background:#fff;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.menu-toggle{background:none;border:none;padding:5px;color:var(--gray);cursor:pointer;border-radius:8px;display:flex;align-items:center}
.topbar-title{font-size:15px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:8px}
.lang-sw{background:var(--light);border:1px solid var(--border);border-radius:8px;padding:4px 9px;color:var(--gray);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}

/* ═══════════════ CHAT ═══════════════ */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border)}
.welcome-state{display:flex;flex-direction:column;align-items:center;padding:18px 0 14px;text-align:center}
.welcome-icon{width:50px;height:50px;background:var(--dark);border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.welcome-title{font-size:16px;font-weight:800;margin-bottom:4px}
.welcome-sub{font-size:12px;color:var(--gray);line-height:1.5;margin-bottom:16px}
.sample-list{width:100%;display:flex;flex-direction:column;gap:6px}
.sample-btn{background:var(--light);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;color:var(--dark);font-size:13px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:9px;font-family:inherit}
.msg-row{display:flex;flex-direction:column}
.msg-row.user{align-items:flex-end}
.msg-row.ai{align-items:flex-start}
.msg-bubble{max-width:88%;padding:10px 14px;font-size:13.5px;line-height:1.75;border-radius:16px;word-break:break-word;white-space:pre-wrap}
.msg-row.user .msg-bubble{background:var(--dark);color:#fff;border-radius:16px 16px 4px 16px}
.msg-row.ai .msg-bubble{background:var(--light);color:var(--dark);border:1px solid var(--border2);border-radius:16px 16px 16px 4px}
.ai-name-tag{font-size:10px;font-weight:600;color:#94a3b8;margin-bottom:3px}
.typing{display:flex;gap:4px;padding:11px 14px;background:var(--light);border:1px solid var(--border2);border-radius:16px 16px 16px 4px;align-self:flex-start}
.dot{width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:bop 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Limit popup */
.limit-popup{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.limit-sheet{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;text-align:center}
.limit-sheet-icon{font-size:44px;margin-bottom:12px}
.limit-sheet-title{font-size:20px;font-weight:800;margin-bottom:6px}
.limit-sheet-sub{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:20px}
.plan-stack{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.plan-row{border-radius:13px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s;border:none;width:100%;font-family:inherit}
.plan-row.p1{background:var(--light);border:1.5px solid var(--border);color:var(--dark)}
.plan-row.p2{background:var(--blue-l);border:2px solid var(--blue);color:var(--dark)}
.plan-row.p3{background:var(--dark);color:#fff}
.pl-price{font-size:16px;font-weight:800;text-align:left}
.pl-name{font-size:10px;opacity:0.6;margin-top:1px;text-align:left}
.pl-feats{font-size:10px;opacity:0.65;text-align:right;line-height:1.6}
.pop-tag{background:var(--blue);color:#fff;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px}
.limit-later{background:none;border:none;color:var(--gray);font-size:13px;cursor:pointer;font-family:inherit;padding:8px}

/* Chat input */
.chat-input-area{padding:10px 14px 14px;border-top:1px solid var(--border2);background:#fff;flex-shrink:0}
.chip-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{background:var(--light);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:11px;font-weight:600;color:var(--gray);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.chip:active{background:var(--blue-l);border-color:var(--blue-b);color:var(--blue)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.chat-textarea{flex:1;background:var(--light);border:1.5px solid var(--border);border-radius:12px;padding:9px 13px;color:var(--dark);font-size:14px;resize:none;outline:none;font-family:inherit;line-height:1.5;max-height:100px}
.chat-textarea:focus{border-color:var(--blue);background:#fff}
.send-btn{background:var(--dark);border:none;border-radius:12px;width:42px;height:42px;color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:disabled{background:var(--border);cursor:not-allowed}

/* ═══════════════ SCREENS ═══════════════ */
.screen{flex:1;overflow-y:auto;padding:16px}
.screen::-webkit-scrollbar{width:3px}
.screen-title{font-size:18px;font-weight:800;margin-bottom:4px}
.screen-sub{font-size:12px;color:var(--gray);margin-bottom:16px}
.usage-bar{background:var(--blue-l);border:1px solid var(--blue-b);border-radius:10px;padding:9px 13px;margin-bottom:14px;font-size:12px;color:var(--blue);font-weight:600;display:flex;align-items:center;justify-content:space-between}
.usage-bar.empty{background:#fef2f2;border-color:#fecaca;color:var(--red)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
.form-select{width:100%;background:var(--light);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--dark);font-size:14px;outline:none;font-family:inherit}
.form-select:focus{border-color:var(--blue)}
.pill-group{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--light);color:var(--gray);font-family:inherit}
.pill.on{background:var(--dark);border-color:var(--dark);color:#fff}
.pill.yr{padding:6px 10px;font-size:11px}
.action-btn{width:100%;background:var(--dark);border:none;border-radius:12px;padding:13px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;margin-top:4px}
.action-btn:disabled{background:var(--border);color:#94a3b8;cursor:not-allowed}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:9px;padding:10px 13px;color:var(--red);font-size:13px;margin-bottom:10px}

/* Loading */
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;text-align:center}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--dark);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-t{font-size:15px;font-weight:700}
.loading-s{font-size:12px;color:#94a3b8}

/* MCQ */
.mcq-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mcq-info{font-size:12px;font-weight:600;color:var(--gray)}
.back-link{background:var(--light);border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--gray);font-size:11px;cursor:pointer;font-family:inherit}
.mcq-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.mcq-n{font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:5px}
.mcq-q{font-size:13.5px;font-weight:500;line-height:1.65;margin-bottom:10px}
.opt{width:100%;border-radius:9px;padding:9px 13px;font-size:13px;text-align:left;cursor:pointer;margin-bottom:5px;font-family:inherit;display:flex;align-items:center;gap:8px}
.opt.u{background:var(--light);border:1px solid var(--border);color:#374151}
.opt.s{background:var(--dark);border:none;color:#fff}
.opt-k{font-weight:800;min-width:16px;font-size:12px}
.submit-btn{width:100%;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}
.submit-btn.r{background:var(--dark);color:#fff}
.submit-btn.n{background:var(--border);color:#94a3b8;cursor:not-allowed}

/* Score */
.score-hdr{text-align:center;padding:18px 0 14px;border-bottom:1px solid var(--border2);margin-bottom:14px}
.score-em{font-size:48px}
.score-n{font-size:36px;font-weight:900;margin-top:6px}
.score-p{font-size:14px;color:var(--gray)}
.result-card{border-radius:10px;padding:11px 13px;margin-bottom:8px;border:1px solid}
.result-card.ok{background:#f0fdf4;border-color:#bbf7d0}
.result-card.ng{background:#fef2f2;border-color:#fecaca}
.result-q{font-size:12px;color:var(--gray);margin-bottom:3px}
.result-a{font-size:13px;font-weight:600}
.result-a.ok{color:var(--green)}.result-a.ng{color:var(--red)}
.result-c{font-size:13px;color:var(--green);margin-top:2px}
.result-e{font-size:11px;color:#94a3b8;margin-top:3px}
.retry-btn{width:100%;background:var(--dark);border:none;border-radius:12px;padding:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;margin-top:8px}

/* PYQ */
.pyq-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.pyq-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.yr-tag{background:var(--dark);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.marks-tag{color:#94a3b8;font-size:11px}
.rep-tag{background:#fef3c7;color:var(--yellow);font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;margin-left:4px}
.pyq-q{font-size:13.5px;line-height:1.65;margin-bottom:10px}
.show-ans-btn{width:100%;background:var(--light);border:1px solid var(--border);border-radius:9px;padding:8px;color:#374151;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.ans-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:10px;color:#166534;font-size:13px;line-height:1.65;margin-bottom:5px}
.tip-box{font-size:11px;color:#94a3b8}

/* Timer */
.timer-bar{display:flex;justify-content:space-between;align-items:center;background:var(--light);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px}
.timer-v{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums}
.timer-l{font-size:10px;color:#94a3b8;margin-top:1px}

/* Analysis */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.stat-card{background:var(--light);border:1px solid var(--border2);border-radius:12px;padding:14px;text-align:center}
.stat-icon{font-size:20px}
.stat-val{font-size:22px;font-weight:800;margin-top:4px;line-height:1}
.stat-lbl{font-size:10px;color:#94a3b8;margin-top:3px}
.area-sec-title{font-size:11px;font-weight:700;letter-spacing:0.5px;margin:14px 0 8px}
.area-sec-title.w{color:var(--red)}.area-sec-title.s{color:var(--green)}

async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(session?.user){
    S.user = session.user;
    await loadProfile(session.user);
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    if(session?.user){
      S.user = session.user;
      await loadProfile(session.user);
    } else {
      S.user = null;
      S.userProfile = null;
    }
    render();
  });
}

async function loadProfile(user){
  let { data, error } = await sb.from('user_profiles').select('*').eq('id', user.id).single();
  if(error || !data){
    // Create profile
    const today = new Date().toISOString().split('T')[0];
    const { data: newProfile } = await sb.from('user_profiles').insert({
      id: user.id,
      email: user.email,
      is_premium: false,
      plan: 'free',
      usage_chat: 0, usage_mcq: 0, usage_pyq: 0, usage_test: 0, usage_predict: 0,
      reset_date: today
    }).select().single();
    S.userProfile = newProfile;
  } else {
    // Check daily reset
    const today = new Date().toISOString().split('T')[0];
    if(data.reset_date !== today){
      await sb.from('user_profiles').update({
        usage_chat: 0, usage_mcq: 0, usage_pyq: 0, usage_test: 0, usage_predict: 0,
        reset_date: today
      }).eq('id', user.id);
      data.usage_chat=0; data.usage_mcq=0; data.usage_pyq=0; data.usage_test=0; data.usage_predict=0;
    }
    S.userProfile = data;
  }
}

async function incrementUsage(feat){
  const key = `usage_${feat}`;
  const newVal = (S.userProfile?.[key] || 0) + 1;
  if(S.userProfile){
    S.userProfile[key] = newVal;
    await sb.from('user_profiles').update({[key]: newVal}).eq('id', S.user.id);
  } else {
    // Guest — track in memory only
    S[`guest_${feat}`] = (S[`guest_${feat}`] || 0) + 1;
  }
}

function guestUsage(feat){
  return S[`guest_${feat}`] || 0;
}

function canUseGuest(feat){
  return guestUsage(feat) < FREE_LIMITS[feat];
}

function checkCan(feat){
  if(S.user) return canUse(feat);
  return canUseGuest(feat);
}

async function gemini(prompt, useWeb=false){
  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt, useWeb})
  });
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  return data?.choices?.[0]?.message?.content||"";
}
async function geminiJSON(prompt, useWeb=false){
  const t=await gemini(prompt,false);
  const m=t.match(/\{[\s\S]*\}/);
  if(!m) throw new Error("no json");
  return JSON.parse(m[0]);
  }

function openPayment(amount){
  const options = {

    name: "BoardAI",
    description: `${PLANS[amount].name} Plan`,
    handler: async function(response){

        const expiry = new Date();
        expiry.setMonth(expiry.getMonth() + 1);
        await sb.from('user_profiles').update({
          is_premium: true,
          plan: amount.toString(),
          plan_expiry: expiry.toISOString()
        }).eq('id', S.user.id);
        S.userProfile.is_premium = true;
        S.userProfile.plan = amount.toString();
        // Save payment record
        await sb.from('payments').insert({
          user_id: S.user.id,
          amount: amount,
          status: 'success',
          razorpay_id: response.razorpay_payment_id
        });
      }
      set({showLimitPopup:false});
      alert(S.lang==="hi"?"Payment successful! Premium active ho gaya! 🎉":"Payment successful! Premium activated! 🎉");
    },
    prefill:{
      email: S.user?.email || "",
    },
    theme:{ color:"#0f172a" }
  };
  const rzp = new Razorpay(options);
  rzp.open();

    totalMCQ:S.totalMCQ+S.testQs.length,totalCorrect:S.totalCorrect+c,
    strongMap:r>=0.6?{...S.strongMap,[ch]:(S.strongMap[ch]||0)+1}:S.strongMap,
    weakMap:r<0.6?{...S.weakMap,[ch]:(S.weakMap[ch]||0)+1}:S.weakMap
  });
}

async function runPredictor(){
  if(!checkCan("predict")){ set({showLimitPopup:true}); return; }
  const chapter=document.getElementById("predSel")?.value||ch()[0];
  set({predLoading:true,prediction:"",predErr:""});
  await incrementUsage("predict");
  try{
    const isHi=S.lang==="hi"; const board=S.board==="bihar"?"Bihar Board":"CBSE";
    const p=isHi
      ?`Tum ${board} Class ${S.cls} Science ke expert exam analyst ho. "${chapter}" chapter ke liye pichle 10 saalon ka pattern analyze karo.

Batao:
1. 🔴 Most likely topics — kya zaroor aayega
2. 🟡 Moderate probability topics
3. 📝 Expected marks weightage
4. 🔄 Jo topics baar baar aaye
5. 💡 Is saal ke liye special tip`
      :`You are expert ${board} Class ${S.cls} Science exam analyst. Analyze last 10 years pattern for "${chapter}".

Tell:
1. 🔴 Most likely topics — what will definitely come
2. 🟡 Moderate probability topics
3. 📝 Expected marks weightage
4. 🔄 Topics that appeared repeatedly
5. 💡 Special tip for this year`;
    const text=await gemini(p,false);
    set({prediction:text,predCh:chapter,predLoading:false});
  }catch(e){set({predErr:tx().serverErr,predLoading:false});}
}

    <div class="pill-group">${[20,30,40,50].map(n=>`<button class="pill ${mcqCnt===n?"on":""}" onclick="set({mcqCnt:${n}})">${n}</button>`).join("")}</div></div>
    ${mcqErr?`<div class="err-box">${mcqErr}</div>`:""}
    <button class="action-btn" onclick="genMCQ()">${t.generateMCQ}</button>
  </div>`;
}

// ── PYQ ──
function renderPYQ(){
  const t=tx(); const {pyqs,pyqLoading,pyqErr,pyqRev,pyqYrs}=S;
  return`<div class="screen">
    <div class="form-group"><label class="form-label">${t.chapterLbl}</label>
    <select class="form-select" onchange="set({pyqCh:this.value})">${ch().map(c=>`<option value="${c}" ${S.pyqCh===c?"selected":""}>${c}</option>`).join("")}</select></div>
    <div class="form-group"><label class="form-label">${t.yearLbl}</label>
    <div class="pill-group">${YEARS.map(y=>`<button class="pill yr ${pyqYrs.includes(y)?"on":""}" onclick="toggleYr(${y})">${y}</button>`).join("")}</div></div>
    ${pyqErr?`<div class="err-box">${pyqErr}</div>`:""}
    <button class="action-btn" onclick="fetchPYQ()" ${!pyqYrs.length?"disabled":""}>${t.fetchPYQ}</button>
    ${pyqLoading?`<div class="loading" style="padding:24px"><div class="spinner"></div><div class="loading-t">${t.searching}</div></div>`:""}
    <div style="margin-top:12px">
    ${pyqs.map((p,i)=>`<div class="pyq-card">
      <div class="pyq-meta"><span><span class="yr-tag">${p.year}</span>${p.repeated?`<span class="rep-tag">${t.repeated}</span>`:""}</span><span class="marks-tag">${p.marks} marks</span></div>
      <div class="pyq-q">${esc(p.q)}</div>
      ${!pyqRev[i]?`<button class="show-ans-btn" onclick="revPYQ(${i})">${t.showAns}</button>`:`<div class="ans-box">✅ ${esc(p.ans)}</div>${p.tip?`<div class="tip-box">💡 ${esc(p.tip)}</div>`:""}`}
    </div>`).join("")}
    </div>
  </div>`;
}

// ── TEST ──
function renderTest(){
  const t=tx(); const {testQs,testLoading,testRunning,testScore,testAns,testTimer,testCh,testCnt}=S;
  const left=S.user?freeLeft("test"):Math.max(0,FREE_LIMITS.test-(S.guest_test||0));
  if(testLoading) return`<div class="loading"><div class="spinner"></div><div class="loading-t">${t.generating}</div></div>`;
  if(testScore) return`<div class="screen">
    <div class="score-hdr"><div class="score-em">${testScore.c/testScore.total>=0.6?"🏆":"📚"}</div><div class="score-n">${testScore.c}/${testScore.total}</div><div class="score-p">${Math.round((testScore.c/testScore.total)*100)}%</div></div>
    ${testQs.map((m,i)=>`<div class="result-card ${testAns[i]===m.ans?"ok":"ng"}">
      <div class="result-q">Q${i+1}. ${esc(m.q)}</div>
      <div class="result-a ${testAns[i]===m.ans?"ok":"ng"}">${testAns[i]===m.ans?"✅":"❌"} ${esc(m[testAns[i]]||"")}</div>
      ${testAns[i]!==m.ans?`<div class="result-c">✓ ${esc(m[m.ans])}</div>`:""}
      <div class="result-e">💡 ${esc(m.exp)}</div>
    </div>`).join("")}
    <button class="retry-btn" onclick="set({testQs:[],testAns:{},testScore:null,testRunning:false})">${t.retry}</button>
  </div>`;
  if(testRunning) return`<div class="screen">
    <div class="timer-bar"><div><div class="timer-v">${fmt(testTimer)}</div><div class="timer-l">${t.timeLeft}</div></div><div style="font-size:12px;font-weight:600;color:var(--gray)">${Object.keys(testAns).length}/${testQs.length}</div></div>
    ${testQs.map((m,i)=>`<div class="mcq-card">
      <div class="mcq-n">Q ${i+1}</div>
      <div class="mcq-q">${esc(m.q)}</div>
      ${["a","b","c","d"].map(o=>`<button class="opt ${testAns[i]===o?"s":"u"}" onclick="selTestOpt(${i},'${o}')"><span class="opt-k">${o.toUpperCase()}.</span>${esc(m[o]||"")}</button>`).join("")}
    </div>`).join("")}
    <button class="submit-btn r" onclick="submitTest()">${t.testDone}</button>
  </div>`;
  return`<div class="screen">
    <div class="form-group"><label class="form-label">${t.chapterLbl}</label>
    <select class="form-select" onchange="set({testCh:this.value})">${ch().map(c=>`<option value="${c}" ${S.testCh===c?"selected":""}>${c}</option>`).join("")}</select></div>
    <div class="form-group"><label class="form-label">${t.countLbl}</label>
    <div class="pill-group">${[10,20,30].map(n=>`<button class="pill ${testCnt===n?"on":""}" onclick="set({testCnt:${n}})">${n}</button>`).join("")}</div></div>
    <button class="action-btn" onclick="startTest()">${t.startTest}</button>
  </div>`;
  }
 
// ── ANALYSIS ──
function renderAnalysis(){
  const t=tx(); const {weakMap,strongMap,totalAsked,totalMCQ,totalCorrect}=S;
  if(!isPremium()) return`<div class="prem-lock">
    <div class="lock-emoji">📊</div>
    <div class="lock-title">${t.analysisLock}</div>
    <div class="lock-sub">${t.analysisLockSub}</div>
    <div class="plan-stack" style="width:100%;max-width:300px">
      ${[49,99,149].map(amt=>`<button class="plan-row ${amt===49?"p1":amt===99?"p2":"p3"}" onclick="openPayment(${amt})">
        <div><div class="pl-price">₹${amt}/month${amt===99?`<span class="pop-tag">⭐</span>`:""}</div><div class="pl-name">${PLANS[amt].name}</div></div>
        <div class="pl-feats">${PLANS[amt].features}</div>
      </button>`).join("")}
    </div>
  </div>`;
  const acc=totalMCQ?Math.round((totalCorrect/totalMCQ)*100)+"%":"—";
  const has=Object.keys(weakMap).length||Object.keys(strongMap).length;
  return`<div class="screen">
    <div class="screen-title">${t.analysisTitle}</div>
    <div class="screen-sub">${t.analysisSub}</div>
    <div class="stats-grid">
      ${[[t.sAsked,totalAsked,"⚡"],[t.sMCQ,totalMCQ,"📝"],[t.sCorrect,totalCorrect,"✅"],[t.sAcc,acc,"🎯"]].map(([l,v,i])=>`<div class="stat-card"><div class="stat-icon">${i}</div><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`).join("")}
    </div>
    ${!has?`<div style="text-align:center;padding:36px 20px"><div style="font-size:44px;margin-bottom:10px">📊</div><div style="color:#94a3b8;font-size:14px">${t.noData}</div></div>`:
    `${Object.keys(weakMap).length?`<div class="area-sec-title w">${t.weakA}</div>${Object.entries(weakMap).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<div class="area-row w"><span style="font-size:13px">${c}</span><span class="area-b w">${n}×</span></div>`).join("")}`:""}
    ${Object.keys(strongMap).length?`<div class="area-sec-title s">${t.strongA}</div>${Object.entries(strongMap).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<div class="area-row s"><span style="font-size:13px">${c}</span><span class="area-b s">${n}×</span></div>`).join("")}`:""}
    `}
  </div>`;
}

// ═══════════
// BIND EVENTS
// ═══════════
function bindEvents(){
  const inp=document.getElementById("chatInput");
  if(inp){
    inp.addEventListener("input",e=>{
      S.question=e.target.value;
      const btn=document.getElementById("sendBtn");
      if(btn) btn.disabled=S.chatLoading||!S.question.trim();
    });
    inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}});
    inp.value=S.question;
    setTimeout(()=>{const ca=document.getElementById("chatArea");if(ca)ca.scrollTop=ca.scrollHeight;},50);
  }
}

initAuth().then(()=>render());
