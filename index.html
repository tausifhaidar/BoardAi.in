<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">

<title>BoardAI - Board Exam AI Tutor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#fff;min-height:100vh;color:#1a1a1a}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}

/* ── LOGO SVG ── */
.logo-wrap{display:flex;align-items:center;gap:10px;justify-content:center}
.logo-icon{width:44px;height:44px}
.logo-text{display:flex;flex-direction:column;align-items:flex-start}
.logo-name{font-size:26px;font-weight:900;letter-spacing:-1px;color:#1a1a1a;line-height:1}
.logo-name span{color:#2563eb}
.logo-sub{font-size:10px;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}

/* ── BANNER AD ── */
.banner-ad{width:100%;background:#f8fafc;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 12px;font-size:11px;color:#94a3b8;letter-spacing:1px}
.banner-ad.top{border-top:none;border-left:none;border-right:none}
.banner-ad.bottom{border-bottom:none;border-left:none;border-right:none;margin-top:auto}
.banner-ad span{color:#cbd5e1;font-size:9px}

/* ── HOME ── */
.home{min-height:100vh;display:flex;flex-direction:column;background:#fff}
.home-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:0}
.home-tagline{color:#64748b;font-size:14px;margin-top:10px;margin-bottom:32px;text-align:center}
.section-label{color:#94a3b8;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;text-align:center}
.board-cards{display:flex;gap:14px;margin-bottom:8px}
.board-card{flex:1;border:1.5px solid #e2e8f0;border-radius:16px;padding:20px 12px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fff}
.board-card:hover{border-color:#2563eb;box-shadow:0 4px 20px rgba(37,99,235,0.1);transform:translateY(-2px)}
.board-card .bc-icon{font-size:28px;margin-bottom:8px}
.board-card .bc-name{font-size:14px;font-weight:700;color:#1a1a1a}
.board-card .bc-sub{font-size:10px;color:#94a3b8;margin-top:3px}

/* ── MEDIUM SELECT ── */
.medium-page{min-height:100vh;display:flex;flex-direction:column;background:#fff}
.medium-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:28px;cursor:pointer;color:#64748b;font-size:14px;align-self:flex-start}
.medium-cards{display:flex;gap:14px;width:100%}
.medium-card{flex:1;border:1.5px solid #e2e8f0;border-radius:16px;padding:24px 12px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fff}
.medium-card:hover{border-color:#2563eb;box-shadow:0 4px 20px rgba(37,99,235,0.1);transform:translateY(-2px)}
.medium-card .mc-icon{font-size:32px;margin-bottom:10px}
.medium-card .mc-name{font-size:16px;font-weight:700}
.medium-card .mc-sub{font-size:11px;color:#94a3b8;margin-top:4px}

/* ── CLASS SELECT ── */
.class-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:#fff}
.class-cards{display:flex;gap:14px;margin-top:14px}
.class-card{width:88px;height:88px;border:1.5px solid #e2e8f0;border-radius:18px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.class-card:hover{border-color:#2563eb;box-shadow:0 4px 16px rgba(37,99,235,0.12);transform:translateY(-2px)}
.class-card .cc-num{font-size:30px;font-weight:900;color:#1a1a1a}
.class-card .cc-label{font-size:9px;color:#94a3b8;font-weight:600;letter-spacing:1px}

/* ── HEADER ── */
.header{padding:11px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;background:#fff;position:sticky;top:0;z-index:20}
.header-left{display:flex;align-items:center;gap:8px}
.back-btn{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;padding:0 4px}
.h-logo{font-size:17px;font-weight:900;letter-spacing:-0.5px}
.h-logo span{color:#2563eb}
.h-badges{display:flex;gap:5px}
.badge{background:#f1f5f9;color:#64748b;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600}
.badge.blue{background:#eff6ff;color:#2563eb}
.header-right{display:flex;gap:6px;align-items:center}
.lang-btn{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:4px 9px;color:#64748b;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.chat-counter{border:1px solid #e2e8f0;border-radius:7px;padding:3px 9px;text-align:center;min-width:36px}
.chat-counter .cn{font-size:13px;font-weight:800;line-height:1.2;color:#1a1a1a}
.chat-counter .cl{font-size:8px;color:#94a3b8}

/* ── PROGRESS ── */
.progress{height:2px;background:#f1f5f9}
.progress-bar{height:100%;background:#2563eb;transition:width 0.5s}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid #f1f5f9;background:#fff;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:none;padding:10px 12px;border:none;background:none;font-size:11px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:#94a3b8;font-family:inherit;transition:all 0.2s}
.tab-btn.active{color:#1a1a1a;font-weight:700;border-bottom-color:#1a1a1a}
.tab-btn .lock{font-size:9px;margin-left:2px}

/* ── CHAT ── */
.chat-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:50vh;max-height:54vh}
.welcome{text-align:center;padding:20px 0}
.welcome-emoji{font-size:40px;margin-bottom:8px}
.welcome-title{font-size:15px;font-weight:700;color:#1a1a1a}
.welcome-sub{font-size:12px;color:#94a3b8;margin-top:4px;margin-bottom:16px}
.sample-grid{display:flex;flex-direction:column;gap:7px}
.sample-btn{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:9px 13px;color:#374151;font-size:13px;text-align:left;cursor:pointer;font-family:inherit;transition:all 0.15s}
.sample-btn:hover{background:#eff6ff;border-color:#bfdbfe}
.msg{display:flex;flex-direction:column;max-width:86%}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.bubble{padding:10px 13px;font-size:13.5px;line-height:1.7;white-space:pre-wrap;border-radius:16px}
.msg.user .bubble{background:#1a1a1a;color:#fff;border-radius:16px 16px 3px 16px}
.msg.ai .bubble{background:#f8fafc;color:#1a1a1a;border:1px solid #e2e8f0;border-radius:16px 16px 16px 3px}
.ai-label{color:#94a3b8;font-size:10px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.typing-dots{display:flex;gap:4px;padding:11px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px 16px 16px 3px;align-self:flex-start}
.dot{width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── PAYWALL ── */
.paywall{margin:0 14px 8px;background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px;text-align:center}
.paywall-icon{font-size:28px;margin-bottom:6px}
.paywall-title{font-weight:700;color:#92400e;font-size:14px;margin-bottom:3px}
.paywall-sub{color:#b45309;font-size:12px;margin-bottom:12px}
.plan-cards-mini{display:flex;gap:8px;margin-bottom:0}
.plan-mini{flex:1;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;border:1.5px solid transparent}
.plan-mini.p49{background:#fff;border-color:#e2e8f0}
.plan-mini.p99{background:#eff6ff;border-color:#bfdbfe}
.plan-mini.p149{background:#1a1a1a;color:#fff}
.plan-mini .pm-price{font-size:13px;font-weight:800}
.plan-mini .pm-label{font-size:9px;opacity:0.7;margin-top:2px}

/* ── PREMIUM LOCK ── */
.premium-lock{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center}
.lock-icon{font-size:52px;margin-bottom:12px}
.lock-title{font-size:18px;font-weight:800;color:#1a1a1a;margin-bottom:6px}
.lock-sub{font-size:13px;color:#64748b;margin-bottom:24px;line-height:1.6}
.plan-cards{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.plan-card{border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.2s}
.plan-card.p49{background:#f8fafc;border:1.5px solid #e2e8f0}
.plan-card.p99{background:#eff6ff;border:1.5px solid #bfdbfe}
.plan-card.p99.popular{border-color:#2563eb}
.plan-card.p149{background:#1a1a1a;color:#fff}
.plan-left .pl-price{font-size:17px;font-weight:800}
.plan-left .pl-name{font-size:11px;opacity:0.6;margin-top:1px}
.plan-right{font-size:11px;opacity:0.7;text-align:right;line-height:1.5}
.popular-badge{background:#2563eb;color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;margin-left:6px}

/* ── BLOCKED + AD ── */
.blocked-box{margin:0 14px 8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:13px;text-align:center}
.blocked-title{font-weight:700;font-size:14px;margin-bottom:8px}
.blocked-btns{display:flex;gap:8px}
.ad-watch-btn{flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:8px;color:#1a1a1a;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit}
.subscribe-btn-sm{flex:1;background:#1a1a1a;border:none;border-radius:9px;padding:8px;color:#fff;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit}
.ad-box{margin:0 14px 8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:13px;text-align:center}
.ad-inner{background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:12px;margin:8px 0}
.ad-timer{color:#64748b;font-weight:600;font-size:13px}
.claim-btn{width:100%;background:#1a1a1a;border:none;border-radius:9px;padding:10px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}

/* ── INPUT ── */
.input-area{padding:10px 14px;border-top:1px solid #f1f5f9;display:flex;gap:8px;align-items:flex-end;background:#fff}
.input-box{flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:9px 13px;color:#1a1a1a;font-size:14px;resize:none;outline:none;font-family:inherit;line-height:1.5}
.input-box:focus{border-color:#2563eb;background:#fff}
.send-btn{background:#1a1a1a;border:none;border-radius:12px;width:42px;height:42px;color:#fff;font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:disabled{background:#e2e8f0;cursor:not-allowed}

/* ── TAB CONTENT ── */
.tab-body{flex:1;overflow-y:auto;padding:16px}
.form-group{margin-bottom:16px}
.form-label{display:block;color:#374151;font-size:12px;font-weight:600;margin-bottom:6px}
.form-select{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 13px;color:#1a1a1a;font-size:14px;outline:none;font-family:inherit;cursor:pointer}
.form-select:focus{border-color:#2563eb}
.pill-group{display:flex;gap:7px;flex-wrap:wrap}
.pill{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b}
.pill.active{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.pill.year-pill{padding:6px 11px;font-size:11px}
.main-action-btn{width:100%;background:#1a1a1a;border:none;border-radius:12px;padding:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;margin-top:4px;transition:all 0.2s}
.main-action-btn:hover{background:#374151}
.main-action-btn:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}
.error-msg{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 13px;color:#dc2626;font-size:13px;margin-bottom:12px}

/* ── LOADING ── */
.loading-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:10px}
.loading-spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top:3px solid #1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-weight:700;font-size:15px;color:#1a1a1a}
.loading-sub{font-size:12px;color:#94a3b8}

/* ── MCQ ── */
.mcq-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mcq-info{font-size:12px;font-weight:600;color:#64748b}
.back-link{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:4px 10px;color:#64748b;font-size:11px;cursor:pointer;font-family:inherit}
.mcq-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:13px;margin-bottom:11px}
.mcq-num{font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:5px}
.mcq-q{font-size:13.5px;font-weight:500;line-height:1.6;margin-bottom:10px;color:#1a1a1a}
.opt-btn{width:100%;border-radius:9px;padding:9px 12px;font-size:13px;text-align:left;cursor:pointer;margin-bottom:6px;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;gap:8px}
.opt-btn.unsel{background:#fff;border:1px solid #e2e8f0;color:#374151}
.opt-btn.unsel:hover{border-color:#94a3b8}
.opt-btn.sel{background:#1a1a1a;border:1px solid #1a1a1a;color:#fff}
.opt-key{font-weight:800;min-width:16px}
.submit-mcq-btn{width:100%;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}
.submit-mcq-btn.ready{background:#1a1a1a;color:#fff}
.submit-mcq-btn.notready{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}

/* ── SCORE ── */
.score-header{text-align:center;padding:20px 0 16px}
.score-emoji{font-size:52px}
.score-num{font-size:36px;font-weight:900;color:#1a1a1a;margin-top:6px}
.score-pct{font-size:15px;color:#64748b;margin-top:2px}
.score-chapter{font-size:12px;color:#94a3b8;margin-top:4px}
.result-card{border-radius:10px;padding:11px 13px;margin-bottom:9px;border:1px solid}
.result-card.correct{background:#f0fdf4;border-color:#bbf7d0}
.result-card.wrong{background:#fef2f2;border-color:#fecaca}
.result-q{font-size:12px;color:#64748b;margin-bottom:4px}
.result-ans{font-size:13px;font-weight:600}
.result-ans.correct{color:#16a34a}
.result-ans.wrong{color:#dc2626}
.result-correct{font-size:13px;color:#16a34a;margin-top:2px}
.result-exp{font-size:11px;color:#94a3b8;margin-top:4px}
.retry-btn{width:100%;background:#1a1a1a;border:none;border-radius:12px;padding:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;margin-top:8px}

/* ── PYQ ── */
.pyq-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:13px;margin-bottom:11px}
.pyq-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.year-tag{background:#1a1a1a;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.marks-tag{color:#94a3b8;font-size:11px}
.pyq-q{font-size:13.5px;line-height:1.6;color:#1a1a1a;margin-bottom:10px}
.show-ans-btn{width:100%;background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:8px;color:#374151;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.ans-reveal{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:10px;color:#166534;font-size:13px;line-height:1.6;margin-bottom:5px}
.tip-text{font-size:11px;color:#94a3b8}
.repeated-tag{background:#fef3c7;color:#92400e;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px}

/* ── ANALYSIS ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px;text-align:center}
.stat-icon{font-size:22px}
.stat-val{font-size:22px;font-weight:800;color:#1a1a1a;margin-top:4px;line-height:1}
.stat-label{font-size:10px;color:#94a3b8;margin-top:4px}
.no-data-box{text-align:center;padding:40px 20px}
.no-data-icon{font-size:44px;margin-bottom:10px}
.no-data-text{color:#94a3b8;font-size:14px}
.area-section-title{font-size:12px;font-weight:700;letter-spacing:0.5px;margin-bottom:10px;margin-top:16px}
.area-section-title.weak{color:#dc2626}
.area-section-title.strong{color:#16a34a}
.area-row{border-radius:10px;padding:10px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.area-row.weak{background:#fef2f2;border:1px solid #fecaca}
.area-row.strong{background:#f0fdf4;border:1px solid #bbf7d0}
.area-name{font-size:13px;color:#374151}
.area-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px}
.area-badge.weak{background:#fee2e2;color:#dc2626}
.area-badge.strong{background:#dcfce7;color:#16a34a}

/* ── TEST ── */
.test-running{flex:1;overflow-y:auto;padding:14px}
.timer-bar{display:flex;justify-content:space-between;align-items:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;margin-bottom:14px}
.timer-val{font-size:18px;font-weight:800;color:#1a1a1a;font-variant-numeric:tabular-nums}
.timer-label{font-size:11px;color:#94a3b8}
.test-q-counter{font-size:12px;color:#64748b;font-weight:600}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
</style>

async function gemini(prompt, useWeb=false){
  const model = useWeb ? MODEL_WEB : MODEL_CHAT;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_KEY}`;
  const body = { contents:[{parts:[{text:prompt}]}] };
  if(useWeb) body.tools=[{google_search:{}}];
  const res = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data?.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"";
}

async function geminiJSON(prompt, useWeb=false){
  const text = await gemini(prompt, useWeb);
  const match = text.match(/\{[\s\S]*\}/);
  if(!match) throw new Error("No JSON in response");
  return JSON.parse(match[0]);
}

async function generateMCQ(){

    const lang = S.lang==="hi"?"Hindi":"English";
    const prompt = `You are the world's best Bihar Board Class ${S.cls} NCERT Science MCQ expert.

Mark important/frequently asked questions.
Explanations in ${lang}.

Return ONLY valid JSON (no markdown, no extra text):
{"mcqs":[{"q":"question","a":"option A","b":"option B","c":"option C","d":"option D","ans":"a","exp":"explanation","important":true}]}`;
    const data = await geminiJSON(prompt, false);

function submitMCQ(){
  let correct=0;
  S.mcqs.forEach((m,i)=>{ if(S.mcqAnswers[i]===m.ans) correct++; });
  const ratio=correct/S.mcqs.length;
  const ch=S.mcqChapter;
  set({
    mcqScore:{correct,total:S.mcqs.length},
    totalMCQ:S.totalMCQ+S.mcqs.length,
    totalCorrect:S.totalCorrect+correct,
    strongMap:ratio>=0.6?{...S.strongMap,[ch]:(S.strongMap[ch]||0)+1}:S.strongMap,
    weakMap:ratio<0.6?{...S.weakMap,[ch]:(S.weakMap[ch]||0)+1}:S.weakMap,
  });
}

Answers in ${lang}.

Return ONLY valid JSON:

async function startTest(){
  if(!S.testChapter) return;
  set({testQs:[],testAnswers:{},testScore:null,testLoading:true,testRunning:false});
  try{
    const lang=S.lang==="hi"?"Hindi":"English";
    const prompt=`You are Bihar Board Class ${S.cls} NCERT Science expert. Generate ${S.testCount} mixed MCQ questions (80% MCQ, 20% short answer concept checks) on "${S.testChapter}" from NCERT. No web search.
Explanations in ${lang}.

Return ONLY valid JSON:
{"mcqs":[{"q":"question","a":"A","b":"B","c":"C","d":"D","ans":"a","exp":"explanation","important":false}]}`;
    const data = await geminiJSON(prompt, false);
    if(!data.mcqs?.length) throw new Error("empty");
    const timeLimit = S.testCount * 90;
    if(S.testInterval) clearInterval(S.testInterval);
    const interval = setInterval(()=>{
      if(S.testTimer<=1){ clearInterval(interval); submitTest(); }
      else set({testTimer:S.testTimer-1});
    },1000);
    set({testQs:data.mcqs,testLoading:false,testRunning:true,testTimer:timeLimit,testInterval:interval});
  } catch(e){
    set({testLoading:false});
  }
}

function submitTest(){
  if(S.testInterval) clearInterval(S.testInterval);
  let correct=0;
  S.testQs.forEach((m,i)=>{ if(S.testAnswers[i]===m.ans) correct++; });
  const ratio=correct/S.testQs.length;
  const ch=S.testChapter;
  set({
    testScore:{correct,total:S.testQs.length},
    testRunning:false, testInterval:null,
    totalMCQ:S.totalMCQ+S.testQs.length,
    totalCorrect:S.totalCorrect+correct,
    strongMap:ratio>=0.6?{...S.strongMap,[ch]:(S.strongMap[ch]||0)+1}:S.strongMap,
    weakMap:ratio<0.6?{...S.weakMap,[ch]:(S.weakMap[ch]||0)+1}:S.weakMap,
  });
}

 // ── MCQ ──
function renderMCQ(){
  if(!isPremium) return renderPremiumLock();
  const {mcqs,mcqLoading,mcqError,mcqAnswers,mcqScore,mcqChapter,mcqCount}=S;
  if(mcqLoading) return `<div class="loading-screen"><div class="loading-spinner"></div><div class="loading-title">${t().generating}</div><div class="loading-sub">${mcqCount} MCQs • ${mcqChapter}</div></div>`;
  if(mcqScore) return `<div class="tab-body">
    <div class="score-header">
      <div class="score-emoji">${mcqScore.correct/mcqScore.total>=0.6?"🏆":"📚"}</div>
      <div class="score-num">${mcqScore.correct}/${mcqScore.total}</div>
      <div class="score-pct">${Math.round((mcqScore.correct/mcqScore.total)*100)}%</div>
      <div class="score-chapter">${mcqChapter}</div>
    </div>
    ${mcqs.map((m,i)=>`
      <div class="result-card ${mcqAnswers[i]===m.ans?"correct":"wrong"}">
        ${m.important?`<span style="font-size:10px;color:#d97706;font-weight:700">${t().importantTag}</span>`:""}
        <div class="result-q">Q${i+1}. ${esc(m.q)}</div>
        <div class="result-ans ${mcqAnswers[i]===m.ans?"correct":"wrong"}">${mcqAnswers[i]===m.ans?"✅":"❌"} ${esc(m[mcqAnswers[i]]||"")}</div>
        ${mcqAnswers[i]!==m.ans?`<div class="result-correct">✓ ${esc(m[m.ans])}</div>`:""}
        <div class="result-exp">💡 ${esc(m.exp)}</div>
      </div>`).join("")}
    <button class="retry-btn" onclick="set({mcqs:[],mcqAnswers:{},mcqScore:null})">${t().retry}</button>
  </div>`;
  if(mcqs.length>0) return `<div class="tab-body">
    <div class="mcq-header-row">
      <span class="mcq-info">${mcqs.length} MCQ • ${mcqChapter}</span>
      <button class="back-link" onclick="set({mcqs:[],mcqError:''})">${t().backBtn}</button>
    </div>
    ${mcqs.map((m,i)=>`
      <div class="mcq-card">
        <div class="mcq-num">Q ${i+1} ${m.important?`<span style="color:#d97706;font-size:10px">${t().importantTag}</span>`:""}</div>
        <div class="mcq-q">${esc(m.q)}</div>
        ${["a","b","c","d"].map(opt=>`
          <button class="opt-btn ${mcqAnswers[i]===opt?"sel":"unsel"}" onclick="selectOpt(${i},'${opt}')">
            <span class="opt-key">${opt.toUpperCase()}.</span>${esc(m[opt]||"")}
          </button>`).join("")}
      </div>`).join("")}
    <button class="submit-mcq-btn ${Object.keys(mcqAnswers).length<mcqs.length?"notready":"ready"}" onclick="submitMCQ()" ${Object.keys(mcqAnswers).length<mcqs.length?"disabled":""}>
      ${t().submit} (${Object.keys(mcqAnswers).length}/${mcqs.length})
    </button>
  </div>`;
  return `<div class="tab-body">
    <div class="form-group">
      <label class="form-label">${t().chapterLabel}</label>
      <select class="form-select" onchange="set({mcqChapter:this.value})">
        ${ch().map(c=>`<option value="${c}" ${S.mcqChapter===c?"selected":""}>${c}</option>`).join("")}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">${t().countLabel}</label>
      <div class="pill-group">${[20,30,40,50].map(n=>`<button class="pill ${mcqCount===n?"active":""}" onclick="set({mcqCount:${n}})">${n}</button>`).join("")}</div>
    </div>
    ${mcqError?`<div class="error-msg">${mcqError}</div>`:""}
    <button class="main-action-btn" onclick="generateMCQ()">${t().generateMCQ}</button>
  </div>`;
}

  if(testLoading) return `<div class="loading-screen"><div class="loading-spinner"></div><div class="loading-title">${t().generating}</div></div>`;
  if(testScore) return `<div class="tab-body">
    <div class="score-header">
      <div class="score-emoji">${testScore.correct/testScore.total>=0.6?"🏆":"📚"}</div>
      <div class="score-num">${testScore.correct}/${testScore.total}</div>
      <div class="score-pct">${Math.round((testScore.correct/testScore.total)*100)}%</div>
    </div>
    ${testQs.map((m,i)=>`
      <div class="result-card ${testAnswers[i]===m.ans?"correct":"wrong"}">

        ${testAnswers[i]!==m.ans?`<div class="result-correct">✓ ${esc(m[m.ans])}</div>`:""}
        <div class="result-exp">💡 ${esc(m.exp)}</div>
      </div>`).join("")}
    <button class="retry-btn" onclick="set({testQs:[],testAnswers:{},testScore:null,testRunning:false})">${t().retry}</button>
  </div>`;
  if(testRunning) return `<div class="test-running">
    <div class="timer-bar">
      <div><div class="timer-val">${fmtTime(testTimer)}</div><div class="timer-label">${t().timeLeft}</div></div>
      <div class="test-q-counter">${Object.keys(testAnswers).length}/${testQs.length}</div>
    </div>
    ${testQs.map((m,i)=>`
      <div class="mcq-card">
        <div class="mcq-num">Q ${i+1}</div>
        <div class="mcq-q">${esc(m.q)}</div>
        ${["a","b","c","d"].map(opt=>`
          <button class="opt-btn ${testAnswers[i]===opt?"sel":"unsel"}" onclick="selectTestOpt(${i},'${opt}')">
            <span class="opt-key">${opt.toUpperCase()}.</span>${esc(m[opt]||"")}
          </button>`).join("")}
      </div>`).join("")}
    <button class="submit-mcq-btn ready" onclick="submitTest()">${t().testDone}</button>
  </div>`;
  return `<div class="tab-body">
    <div class="form-group">
      <label class="form-label">${t().chapterLabel}</label>
      <select class="form-select" onchange="set({testChapter:this.value})">
        ${ch().map(c=>`<option value="${c}" ${S.testChapter===c?"selected":""}>${c}</option>`).join("")}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">${t().countLabel}</label>
      <div class="pill-group">${[10,20,30].map(n=>`<button class="pill ${testCount===n?"active":""}" onclick="set({testCount:${n}})">${n}</button>`).join("")}</div>
    </div>
    <button class="main-action-btn" onclick="startTest()">${t().startTest}</button>
  </div>`;
}

// ── ANALYSIS ──
function renderAnalysis(){
  const {weakMap,strongMap,totalAsked,totalMCQ,totalCorrect}=S;
  const acc=totalMCQ?Math.round((totalCorrect/totalMCQ)*100)+"%":"—";
  const hasData=Object.keys(weakMap).length>0||Object.keys(strongMap).length>0;
  return `<div class="tab-body">
    <div class="stats-grid">
      ${[[t().statAsked,totalAsked,"⚡"],[t().statMCQ,totalMCQ,"📝"],[t().statCorrect,totalCorrect,"✅"],[t().statAcc,acc,"🎯"]].map(([label,val,icon])=>`
        <div class="stat-card"><div class="stat-icon">${icon}</div><div class="stat-val">${val}</div><div class="stat-label">${label}</div></div>`).join("")}
    </div>
    ${!hasData?`<div class="no-data-box"><div class="no-data-icon">📊</div><div class="no-data-text">${t().noData}</div></div>`:`
      ${Object.keys(weakMap).length>0?`
        <div class="area-section-title weak">${t().weakAreas}</div>
        ${Object.entries(weakMap).sort((a,b)=>b[1]-a[1]).map(([ch,c])=>`
          <div class="area-row weak"><span class="area-name">${ch}</span><span class="area-badge weak">${c}×</span></div>`).join("")}`:""}
      ${Object.keys(strongMap).length>0?`
        <div class="area-section-title strong">${t().strongAreas}</div>
        ${Object.entries(strongMap).sort((a,b)=>b[1]-a[1]).map(([ch,c])=>`
          <div class="area-row strong"><span class="area-name">${ch}</span><span class="area-badge strong">${c}×</span></div>`).join("")}`:""}
    `}
  </div>`;
}

// 🎬 MAIN RENDER
// ══════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  if(S.screen==="home") app.innerHTML=renderHome();
  else if(S.screen==="medium") app.innerHTML=renderMedium();
  else if(S.screen==="classSelect") app.innerHTML=renderClassSelect();
  else app.innerHTML=renderApp();
  bindEvents();
}

function setQ(q){ set({question:q}); }

function bindEvents(){
  const inp=document.getElementById("chatInput");
  if(inp){
    inp.addEventListener("input",e=>{ S.question=e.target.value; const btn=document.getElementById("sendBtn"); if(btn) btn.disabled=S.chatLoading||!S.question.trim(); });
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();} });
    inp.value=S.question;
    setTimeout(()=>{ const ca=document.getElementById("chatArea"); if(ca) ca.scrollTop=ca.scrollHeight; },50);
  }
}

// 🚀 INIT
// ══════════════════════════════════════════════
render();
