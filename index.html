// ── AUTH ──
async function initAuth(){
  const {data:{session}} = await sb.auth.getSession();
  if(session?.user){ S.user=session.user; await loadProfile(session.user); applyProfile(); }
  sb.auth.onAuthStateChange(async(ev,sess)=>{
    if(ev==="SIGNED_IN"&&sess?.user){
      S.user=sess.user; await loadProfile(sess.user);
      if(S.profile?.board&&S.profile?.cls){
        S.board=S.profile.board; S.medium=S.profile.medium||"en";
        S.cls=S.profile.cls; S.lang=S.medium;
        initChapters(); S.screen="app";
      } else { S.screen="boardSelect"; }
      render();
    } else if(ev==="SIGNED_OUT"){ S.user=null;S.profile=null;S.screen="landing";render(); }
  });
}

async function loadProfile(user){
  let {data} = await sb.from('user_profiles').select('*').eq('id',user.id).single();
  if(!data){
    const today=new Date().toISOString().split('T')[0];
    const {data:np} = await sb.from('user_profiles').insert({
      id:user.id,email:user.email,is_premium:false,plan:'free',
      usage_chat:0,usage_mcq:0,usage_pyq:0,usage_test:0,usage_predict:0,reset_date:today
    }).select().single();
    S.profile=np;
  } else {
    const today=new Date().toISOString().split('T')[0];
    if(data.reset_date!==today){
      await sb.from('user_profiles').update({usage_chat:0,usage_mcq:0,usage_pyq:0,usage_test:0,usage_predict:0,reset_date:today}).eq('id',user.id);
      data.usage_chat=0;data.usage_mcq=0;data.usage_pyq=0;data.usage_test=0;data.usage_predict=0;
    }
    S.profile=data;
  }
}

function applyProfile(){
  if(S.profile?.board&&S.profile?.cls){
    S.board=S.profile.board; S.medium=S.profile.medium||"en";
    S.cls=S.profile.cls; S.lang=S.medium; initChapters(); S.screen="app";
  }
}

function initChapters(){
  if(!S.cls) return;
  S.mcqCh=CH[S.cls][0]; S.pyqCh=CH[S.cls][0]; S.testCh=CH[S.cls][0]; S.predCh=CH[S.cls][0];
}

async function logout(){ await sb.auth.signOut(); }
async function saveProfile(u){ if(S.user&&S.profile){ Object.assign(S.profile,u); await sb.from('user_profiles').update(u).eq('id',S.user.id); } }
async function incUsage(f){
  if(S.user&&S.profile){ S.profile[`usage_${f}`]=(S.profile[`usage_${f}`]||0)+1; await sb.from('user_profiles').update({[`usage_${f}`]:S.profile[`usage_${f}`]}).eq('id',S.user.id); }
  else { S[`g_${f}`]=(S[`g_${f}`]||0)+1; }
}

// ── GROQ ──
async function ai(prompt){
  const r=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt})
  });
  const d=await r.json();
  if(d.error) throw new Error(d.error.message);
  return d?.choices?.[0]?.message?.content||"";
}
async function aiJSON(p){const t=await ai(p);const m=t.match(/\{[\s\S]*\}/);if(!m) throw new Error("no json");return JSON.parse(m[0]);}

function goToApp(board,medium,cls){
  S.board=board; S.medium=medium; S.cls=cls; S.lang=medium;
  initChapters();
  S.screen="app"; S.tab="chat"; S.msgs=[]; S.menuOpen=false;
  S.pyqYrs=[]; S.weakMap={}; S.strongMap={}; S.totalAsked=0; S.totalMCQ=0; S.totalCorrect=0;
  saveProfile({board,medium,cls});
  render();
}
  
// CHAT — no re-render on typing
async function sendChat(){
  const q=S.question.trim();
  if(!q||S.chatLoading) return;
  if(!canUse("chat")){ set({showPrem:true}); return; }
  S.msgs=[...S.msgs,{r:"user",t:q}];
  S.question=""; S.chatLoading=true; S.totalAsked++;
  renderMsgs(); updateInput();
  await incUsage("chat");
  try{
    const isHi=l()==="hi";
    const p=isHi
      ?`Tum BoardAI ho — world-class NCERT, Bihar Board, CBSE professor. Class ${S.cls} Science ke expert.
Style: seedha point pe aao. Default: 3-5 lines. Detail sirf jab user maange.
Formulas clearly likho. Numericals step-by-step. Non-science: "Sirf Science ke sawaalon ka jawab deta hun."
Har jawab ke end mein: 💡 Key point: [ek line]
Sawaal: ${q}`
      :`You are BoardAI — world-class NCERT, Bihar Board, CBSE professor for Class ${S.cls} Science.
Style: straight to the point. Default: 3-5 lines. Detail only when asked.
Write formulas clearly. Numericals step by step. Non-science: "I only answer Science questions."
End every answer with: 💡 Key point: [one line]
Question: ${q}`;
    const text=await ai(p);
    S.msgs=[...S.msgs,{r:"ai",t:text}]; S.chatLoading=false; renderMsgs();
  }catch(e){ S.msgs=[...S.msgs,{r:"ai",t:l()==="hi"?"Server error. Dobara try karein.":"Server error. Try again."}]; S.chatLoading=false; renderMsgs(); }
}

      <div class="font-bold text-base mb-1">${l()==="hi"?"Koi bhi sawaal poochho":"Ask anything"}</div>
      <div class="text-xs text-slate-400 mb-5">Class ${S.cls} • NCERT • ${l()==="hi"?"Professor level AI":"Professor level AI"}</div>
      <div class="w-full flex flex-col gap-2">
        ${(SAMPLES[S.cls]?.[l()]||[]).map(q=>`<button onclick="setQ('${q.replace(/'/g,"\\'")}  ')" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-left text-slate-700">→ ${q}</button>`).join("")}
      </div>
    </div>`;
    return;
  }
  a.innerHTML=S.msgs.map(m=>`<div class="flex ${m.r==="user"?"justify-end":"justify-start"} mb-2">
    <div class="max-w-[88%]">
      ${m.r==="ai"?`<div class="text-[10px] font-semibold text-slate-400 mb-1">🎓 BoardAI</div>`:""}
      <div class="msg-bubble px-3.5 py-2.5 rounded-2xl text-sm leading-7 ${m.r==="user"?"bg-slate-900 text-white rounded-br-sm":"bg-slate-50 border border-slate-200 text-slate-900 rounded-bl-sm"}">${esc(m.t)}</div>
    </div>
  </div>`).join("")
  +(S.chatLoading?`<div class="flex justify-start mb-2"><div class="bg-slate-50 border border-slate-200 rounded-2xl rounded-bl-sm px-4 py-3 flex gap-1.5"><div class="dot w-1.5 h-1.5 bg-slate-400 rounded-full"></div><div class="dot w-1.5 h-1.5 bg-slate-400 rounded-full"></div><div class="dot w-1.5 h-1.5 bg-slate-400 rounded-full"></div></div></div>`:"");
  a.scrollTop=a.scrollHeight;
}

function selOpt(i,o){

async function genMCQ(){
  if(!S.mcqCh||!canUse("mcq")){ if(!canUse("mcq")) set({showPrem:true}); return; }
  set({mcqs:[],mcqAns:{},mcqScore:null,mcqErr:"",mcqLoading:true});
  await incUsage("mcq");
  try{
    const lang=l()==="hi"?"Hindi":"English";
    const d=await aiJSON(`You are Bihar Board/CBSE Class ${S.cls} NCERT Science MCQ expert.
Generate exactly ${S.mcqCnt} MCQ on "${S.mcqCh}" from NCERT. Explanations in ${lang}. Mark important ones.
Return ONLY JSON: {"mcqs":[{"q":"question","a":"A","b":"B","c":"C","d":"D","ans":"a","exp":"explanation","important":false}]}`);
    if(!d.mcqs?.length) throw new Error("empty");
    set({mcqs:d.mcqs,mcqLoading:false});
  }catch(e){ set({mcqErr:l()==="hi"?"MCQ nahi bana. Dobara try karein.":"Could not generate MCQ.",mcqLoading:false}); }
}

function submitMCQ(){
  let c=0; S.mcqs.forEach((m,i)=>{ if(S.mcqAns[i]===m.ans) c++; });
  const r=c/S.mcqs.length,ch=S.mcqCh;
  set({mcqScore:{c,total:S.mcqs.length},totalMCQ:S.totalMCQ+S.mcqs.length,totalCorrect:S.totalCorrect+c,
    strongMap:r>=0.6?{...S.strongMap,[ch]:(S.strongMap[ch]||0)+1}:S.strongMap,
    weakMap:r<0.6?{...S.weakMap,[ch]:(S.weakMap[ch]||0)+1}:S.weakMap});
}

async function fetchPYQ(){
  if(!S.pyqCh||!S.pyqYrs.length||!canUse("pyq")){ if(!canUse("pyq")) set({showPrem:true}); return; }
  set({pyqs:[],pyqRev:{},pyqErr:"",pyqLoading:true});
  await incUsage("pyq");
  try{
    const lang=l()==="hi"?"Hindi":"English"; const board=S.board==="bihar"?"Bihar Board":"CBSE";
    const d=await aiJSON(`Find real previous year questions from ${board} Class ${S.cls} Science for "${S.pyqCh}" from years: ${S.pyqYrs.join(", ")}.
Answers in ${lang}. Return ONLY JSON: {"pyqs":[{"year":2023,"q":"question","marks":2,"ans":"answer","tip":"tip","repeated":false}]}`);
    if(!d.pyqs?.length) throw new Error("empty");
    set({pyqs:d.pyqs,pyqLoading:false});
  }catch(e){ set({pyqErr:l()==="hi"?"PYQ nahi mila.":"Could not find PYQ.",pyqLoading:false}); }
}

function toggleYr(y){
  S.pyqYrs=S.pyqYrs.includes(y)?S.pyqYrs.filter(x=>x!==y):[...S.pyqYrs,y];
  document.querySelectorAll(".yrpill").forEach(el=>{
    const yr=parseInt(el.dataset.yr);
    el.className=`yrpill px-3 py-1.5 rounded-full text-xs font-semibold border cursor-pointer ${S.pyqYrs.includes(yr)?"bg-slate-900 text-white border-slate-900":"bg-slate-50 text-slate-600 border-slate-200"}`;
  });

}

  const el=document.getElementById(`pyqans${i}`);
  if(el) el.innerHTML=`<div class="bg-green-50 border border-green-200 rounded-xl p-3 text-green-800 text-sm leading-relaxed">✅ ${esc(S.pyqs[i].ans)}</div>${S.pyqs[i].tip?`<div class="text-xs text-slate-400 mt-1.5">💡 ${esc(S.pyqs[i].tip)}</div>`:""}`;
}

async function startTest(){
  if(!S.testCh||!canUse("test")){ if(!canUse("test")) set({showPrem:true}); return; }
  set({testQs:[],testAns:{},testScore:null,testLoading:true,testRunning:false});
  await incUsage("test");
  try{
    const lang=l()==="hi"?"Hindi":"English";
    const d=await aiJSON(`Generate ${S.testCnt} MCQ on "${S.testCh}" Class ${S.cls} NCERT Science. Explanations in ${lang}.
Return ONLY JSON: {"mcqs":[{"q":"q","a":"A","b":"B","c":"C","d":"D","ans":"a","exp":"exp","important":false}]}`);
    if(!d.mcqs?.length) throw new Error("empty");
    const secs=S.testCnt*90;
    if(S.testIv) clearInterval(S.testIv);
    const iv=setInterval(()=>{
      if(S.testTimer<=1){ clearInterval(iv); submitTest(); }
      else{ S.testTimer--; const tv=document.getElementById("tvl"); if(tv) tv.textContent=fmtT(S.testTimer); }
    },1000);
    set({testQs:d.mcqs,testLoading:false,testRunning:true,testTimer:secs,testIv:iv});
  }catch(e){ set({testLoading:false}); }
}

function submitTest(){
  if(S.testIv) clearInterval(S.testIv);
  let c=0; S.testQs.forEach((m,i)=>{ if(S.testAns[i]===m.ans) c++; });
  const r=c/S.testQs.length,ch=S.testCh;
  set({testScore:{c,total:S.testQs.length},testRunning:false,testIv:null,
    totalMCQ:S.totalMCQ+S.testQs.length,totalCorrect:S.totalCorrect+c,
    strongMap:r>=0.6?{...S.strongMap,[ch]:(S.strongMap[ch]||0)+1}:S.strongMap,
    weakMap:r<0.6?{...S.weakMap,[ch]:(S.weakMap[ch]||0)+1}:S.weakMap});
}

async function runPredictor(){
  if(!canUse("predict")){ set({showPrem:true}); return; }
  const chapter=document.getElementById("predSel")?.value||chs()[0];
  set({predLoading:true,prediction:"",predErr:""});
  await incUsage("predict");
  try{
    const isHi=l()==="hi"; const board=S.board==="bihar"?"Bihar Board":"CBSE";
    const text=await ai(isHi
      ?`Tum ${board} Class ${S.cls} Science exam analyst ho. "${chapter}" chapter ke liye pichle 10 saalon ka pattern analyze karo. Batao: 1.🔴 Most likely topics 2.🟡 Moderate probability 3.📝 Expected marks 4.🔄 Repeated topics 5.💡 Special tip`
      :`You are ${board} Class ${S.cls} Science exam analyst. Analyze last 10 years pattern for "${chapter}". Tell: 1.🔴 Most likely topics 2.🟡 Moderate probability 3.📝 Expected marks 4.🔄 Repeated topics 5.💡 Special tip`);
    set({prediction:text,predCh:chapter,predLoading:false});
  }catch(e){ set({predErr:"Error. Try again.",predLoading:false}); }
}

  S.practiceTab=t;
  ["mcq","pyq","test"].forEach(x=>{ const el=document.getElementById(`pt${x}`); if(el) el.style.display=x===t?"block":"none"; });
  document.querySelectorAll(".ptab").forEach(b=>{ b.className=`ptab flex-1 py-2.5 text-xs font-semibold text-center cursor-pointer border-b-2 ${b.dataset.t===t?"border-slate-900 text-slate-900":"border-transparent text-slate-400"}`; });
  }

function render(){
  const root=document.getElementById("root");
  if(S.screen==="landing"){ root.innerHTML=renderLanding(); return; }
  if(S.screen==="boardSelect"){ root.innerHTML=renderBoardSelect(); return; }
  if(S.screen==="mediumSelect"){ root.innerHTML=renderMediumSelect(); return; }
  if(S.screen==="classSelect"){ root.innerHTML=renderClassSelect(); return; }
  root.innerHTML=renderApp();
  // bind chat
  const inp=document.getElementById("cInp");
  if(inp){
    inp.value=S.question;

  if(mcqLoading) mcqH=`<div class="flex flex-col items-center py-12 gap-3"><div class="w-8 h-8 border-[3px] border-slate-200 border-t-slate-900 rounded-full spinner"></div><div class="text-sm font-bold">${ln==="hi"?"Generate ho raha hai...":"Generating..."}</div><div class="text-xs text-slate-400">${mcqCnt} MCQs • ${mcqCh}</div></div>`;
  else if(mcqScore) mcqH=`<div class="text-center py-6 border-b border-slate-100 mb-4"><div class="text-5xl">${mcqScore.c/mcqScore.total>=0.6?"🏆":"📚"}</div><div class="text-3xl font-black mt-2">${mcqScore.c}/${mcqScore.total}</div><div class="text-sm text-slate-400">${Math.round((mcqScore.c/mcqScore.total)*100)}%</div></div>
    ${mcqs.map((m,i)=>`<div class="border rounded-xl p-3 mb-2 text-sm ${mcqAns[i]===m.ans?"border-green-200 bg-green-50":"border-red-200 bg-red-50"}">
      ${m.important?`<span class="text-[9px] text-amber-600 font-bold">⭐ IMPORTANT</span><br>`:""}
      <span class="text-xs text-slate-500">Q${i+1}. ${esc(m.q)}</span><br>
      <span class="font-semibold ${mcqAns[i]===m.ans?"text-green-700":"text-red-600"}">${mcqAns[i]===m.ans?"✅":"❌"} ${esc(m[mcqAns[i]]||"")}</span>
      ${mcqAns[i]!==m.ans?`<br><span class="text-green-700 text-xs">✓ ${esc(m[m.ans])}</span>`:""}
      <br><span class="text-[11px] text-slate-400">💡 ${esc(m.exp)}</span>
    </div>`).join("")}
    <button onclick="set({mcqs:[],mcqAns:{},mcqScore:null})" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-sm mt-2">🔄 ${ln==="hi"?"Dobara":"Try Again"}</button>`;
  else if(mcqs.length>0) mcqH=`<div class="flex justify-between items-center mb-3">
      <span class="text-xs font-semibold text-slate-500">${mcqs.length} MCQ • ${mcqCh}</span>
      <button onclick="set({mcqs:[],mcqErr:''})" class="text-xs text-slate-400 border border-slate-200 px-2.5 py-1 rounded-lg">← Back</button>
    </div>
    ${mcqs.map((m,i)=>`<div class="bg-white border border-slate-200 rounded-xl p-4 mb-3 shadow-sm">
      <div class="text-[10px] text-slate-400 font-semibold mb-1">Q ${i+1} ${m.important?"⭐":""}</div>
      <div class="text-sm font-medium leading-relaxed mb-3">${esc(m.q)}</div>
      <div class="og${i} flex flex-col gap-1.5">
        ${["a","b","c","d"].map(o=>`<button class="w-full text-left px-3 py-2.5 rounded-xl text-sm flex items-center gap-2 border transition-all ${mcqAns[i]===o?"bg-slate-900 text-white border-slate-900":"bg-slate-50 text-slate-700 border-slate-200"}" onclick="selOpt(${i},'${o}')">
          <span class="font-bold text-xs w-4">${o.toUpperCase()}.</span><span>${esc(m[o]||"")}</span>
        </button>`).join("")}
      </div>
    </div>`).join("")}
    <button id="mcqSub" onclick="submitMCQ()" disabled class="w-full py-3.5 rounded-xl font-bold text-sm mt-2 bg-slate-200 text-slate-400 cursor-not-allowed">✓ Submit (0/${mcqs.length})</button>`;
  else mcqH=`${mcqErr?`<div class="bg-red-50 border border-red-200 rounded-xl p-3 mb-3 text-red-600 text-sm">${mcqErr}</div>`:""}
    <div class="mb-4"><label class="text-xs font-semibold text-slate-600 block mb-2">Chapter</label>
    <select onchange="S.mcqCh=this.value" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm outline-none bg-white">${chs().map(c=>`<option value="${c}" ${mcqCh===c?"selected":""}>${c}</option>`).join("")}</select></div>
    <div class="mb-5"><label class="text-xs font-semibold text-slate-600 block mb-2">${ln==="hi"?"Kitne MCQ?":"Number of MCQs"}</label>
    <div class="flex gap-2">${[20,30,40,50].map(n=>`<button onclick="S.mcqCnt=${n}" class="px-4 py-2 rounded-full text-xs font-semibold border ${mcqCnt===n?"bg-slate-900 text-white border-slate-900":"bg-slate-50 text-slate-600 border-slate-200"}">${n}</button>`).join("")}</div></div>
    <button onclick="genMCQ()" class="w-full py-3.5 bg-slate-900 text-white rounded-xl font-bold text-sm">⚡ ${ln==="hi"?"MCQ Generate Karein":"Generate MCQ"}</button>`;

  // PYQ
  const pyqH=`${pyqErr?`<div class="bg-red-50 border border-red-200 rounded-xl p-3 mb-3 text-red-600 text-sm">${pyqErr}</div>`:""}
    <div class="mb-4"><label class="text-xs font-semibold text-slate-600 block mb-2">Chapter</label>
    <select onchange="S.pyqCh=this.value" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm outline-none bg-white">${chs().map(c=>`<option value="${c}" ${S.pyqCh===c?"selected":""}>${c}</option>`).join("")}</select></div>
    <div class="mb-5"><label class="text-xs font-semibold text-slate-600 block mb-2">${ln==="hi"?"Saal Chuniye":"Select Years"}</label>
    <div class="flex flex-wrap gap-2">${YEARS.map(y=>`<button data-yr="${y}" class="yrpill px-3 py-1.5 rounded-full text-xs font-semibold border cursor-pointer ${pyqYrs.includes(y)?"bg-slate-900 text-white border-slate-900":"bg-slate-50 text-slate-600 border-slate-200"}" onclick="toggleYr(${y})">${y}</button>`).join("")}</div></div>
    <button id="pyqBtn" onclick="fetchPYQ()" ${!pyqYrs.length?"disabled":""} class="w-full py-3.5 bg-slate-900 text-white rounded-xl font-bold text-sm disabled:bg-slate-200 disabled:text-slate-400">🔍 ${ln==="hi"?"PYQ Dhundhein":"Find PYQ"}</button>
    ${pyqLoading?`<div class="flex items-center justify-center py-8 gap-3"><div class="w-6 h-6 border-2 border-slate-200 border-t-slate-900 rounded-full spinner"></div><span class="text-sm text-slate-500">${ln==="hi"?"Khoj raha hai...":"Searching..."}</span></div>`:""}
    <div class="mt-4">${pyqs.map((p,i)=>`<div class="bg-white border border-slate-200 rounded-xl p-4 mb-3 shadow-sm">
      <div class="flex justify-between items-center mb-2">
        <span class="bg-slate-900 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">${p.year}${p.repeated?` 🔄`:""}</span>
        <span class="text-xs text-slate-400">${p.marks} marks</span>
      </div>
      <div class="text-sm leading-relaxed mb-3">${esc(p.q)}</div>
      <div id="pyqans${i}"><button onclick="revPYQ(${i})" class="w-full py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700">👁 ${ln==="hi"?"Jawab Dekho":"Show Answer"}</button></div>
    </div>`).join("")}</div>`;

  // TEST
  let testH="";
  if(testLoading) testH=`<div class="flex flex-col items-center py-12 gap-3"><div class="w-8 h-8 border-[3px] border-slate-200 border-t-slate-900 rounded-full spinner"></div><div class="text-sm font-bold">${ln==="hi"?"Test ban raha hai...":"Generating test..."}</div></div>`;
  else if(testScore) testH=`<div class="text-center py-6 border-b border-slate-100 mb-4"><div class="text-5xl">${testScore.c/testScore.total>=0.6?"🏆":"📚"}</div><div class="text-3xl font-black mt-2">${testScore.c}/${testScore.total}</div><div class="text-sm text-slate-400">${Math.round((testScore.c/testScore.total)*100)}%</div></div>
    ${testQs.map((m,i)=>`<div class="border rounded-xl p-3 mb-2 text-sm ${testAns[i]===m.ans?"border-green-200 bg-green-50":"border-red-200 bg-red-50"}">
      <span class="text-xs text-slate-500">Q${i+1}. ${esc(m.q)}</span><br>
      <span class="font-semibold ${testAns[i]===m.ans?"text-green-700":"text-red-600"}">${testAns[i]===m.ans?"✅":"❌"} ${esc(m[testAns[i]]||"")}</span>
      ${testAns[i]!==m.ans?`<br><span class="text-green-700 text-xs">✓ ${esc(m[m.ans])}</span>`:""}
      <br><span class="text-[11px] text-slate-400">💡 ${esc(m.exp)}</span>
    </div>`).join("")}
    <button onclick="set({testQs:[],testAns:{},testScore:null,testRunning:false})" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-sm mt-2">🔄 ${ln==="hi"?"Dobara":"Try Again"}</button>`;
  else if(testRunning) testH=`<div class="flex justify-between items-center bg-slate-50 border border-slate-200 rounded-xl p-3 mb-4">
      <div><div id="tvl" class="text-xl font-black">${fmtT(testTimer)}</div><div class="text-[10px] text-slate-400">${ln==="hi"?"Waqt bacha":"Time Left"}</div></div>
      <div class="text-sm font-semibold text-slate-500">${Object.keys(testAns).length}/${testQs.length}</div>
    </div>
    ${testQs.map((m,i)=>`<div class="bg-white border border-slate-200 rounded-xl p-4 mb-3 shadow-sm">
      <div class="text-[10px] text-slate-400 font-semibold mb-1">Q ${i+1}</div>
      <div class="text-sm font-medium leading-relaxed mb-3">${esc(m.q)}</div>
      <div class="tg${i} flex flex-col gap-1.5">
        ${["a","b","c","d"].map(o=>`<button class="w-full text-left px-3 py-2.5 rounded-xl text-sm flex items-center gap-2 border transition-all ${testAns[i]===o?"bg-slate-900 text-white border-slate-900":"bg-slate-50 text-slate-700 border-slate-200"}" onclick="selTestOpt(${i},'${o}')">
          <span class="font-bold text-xs w-4">${o.toUpperCase()}.</span><span>${esc(m[o]||"")}</span>
        </button>`).join("")}
      </div>
    </div>`).join("")}
    <button onclick="submitTest()" class="w-full py-3.5 bg-blue-600 text-white rounded-xl font-bold text-sm">✓ ${ln==="hi"?"Test Submit":"Submit Test"}</button>`;
  else testH=`<div class="mb-4"><label class="text-xs font-semibold text-slate-600 block mb-2">Chapter</label>
    <select onchange="S.testCh=this.value" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm outline-none bg-white">${chs().map(c=>`<option value="${c}" ${testCh===c?"selected":""}>${c}</option>`).join("")}</select></div>
    <div class="mb-5"><label class="text-xs font-semibold text-slate-600 block mb-2">Questions</label>
    <div class="flex gap-2">${[10,20,30].map(n=>`<button onclick="S.testCnt=${n}" class="px-4 py-2 rounded-full text-xs font-semibold border ${testCnt===n?"bg-slate-900 text-white border-slate-900":"bg-slate-50 text-slate-600 border-slate-200"}">${n}</button>`).join("")}</div></div>
    <button onclick="startTest()" class="w-full py-3.5 bg-slate-900 text-white rounded-xl font-bold text-sm">⏱ ${ln==="hi"?"Test Shuru Karein":"Start Test"}</button>`;

  return`<div class="flex flex-col flex-1 overflow-hidden">
    <div class="flex border-b border-slate-100 bg-white flex-shrink-0">
      ${[["mcq","📝 MCQ"],["pyq","📜 PYQ"],["test","🧪 Test"]].map(([t,lb])=>`<div data-t="${t}" class="ptab flex-1 py-2.5 text-xs font-semibold text-center cursor-pointer border-b-2 ${pt===t?"border-slate-900 text-slate-900":"border-transparent text-slate-400"}" onclick="setPTab('${t}')">${lb}</div>`).join("")}
    </div>
    <div class="flex-1 overflow-y-auto p-4">
      <div id="ptmcq" style="display:${pt==="mcq"?"block":"none"}">${mcqH}</div>
      <div id="ptpyq" style="display:${pt==="pyq"?"block":"none"}">${pyqH}</div>
      <div id="pttest" style="display:${pt==="test"?"block":"none"}">${testH}</div>
    </div>
  </div>`;
}

function setPTab(t){
  S.practiceTab=t;
  ["mcq","pyq","test"].forEach(x=>{ const el=document.getElementById(`pt${x}`); if(el) el.style.display=x===t?"block":"none"; });
  document.querySelectorAll(".ptab").forEach(b=>{ b.className=`ptab flex-1 py-2.5 text-xs font-semibold text-center cursor-pointer border-b-2 ${b.dataset.t===t?"border-slate-900 text-slate-900":"border-transparent text-slate-400"}`; });
}

function renderAnalysis(){
  const ln=l();
  if(!isPrem()) return`<div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
    <div class="text-5xl mb-3">📊</div>
    <div class="font-bold text-lg mb-2">${ln==="hi"?"Analysis Premium mein hai":"Analysis is Premium"}</div>
    <div class="text-slate-400 text-sm mb-6">${ln==="hi"?"MCQ aur Test solve karne ke baad analysis dekhein":"View your performance analysis"}</div>
    ${[49,99,149].map(a=>`<button onclick="openPayment(${a})" class="w-full max-w-xs flex items-center justify-between px-4 py-3.5 rounded-xl border-2 mb-3 ${a===99?"border-blue-600 bg-blue-50":"border-slate-200"} mx-auto">
      <div class="font-bold text-sm">₹${a}/month</div><div class="text-xs text-slate-400">${PLANS[a].name}</div>
    </button>`).join("")}
  </div>`;
  const {weakMap,strongMap,totalAsked,totalMCQ,totalCorrect}=S;
  const acc=totalMCQ?Math.round((totalCorrect/totalMCQ)*100)+"%":"—";
  const has=Object.keys(weakMap).length||Object.keys(strongMap).length;
  return`<div class="flex-1 overflow-y-auto p-4">
    <div class="grid grid-cols-2 gap-3 mb-5">
      ${[[ln==="hi"?"Sawaal":"Asked",totalAsked,"⚡"],[ln==="hi"?"MCQ":"MCQ",totalMCQ,"📝"],[ln==="hi"?"Sahi":"Correct",totalCorrect,"✅"],["Accuracy",acc,"🎯"]].map(([lb,v,ic])=>`<div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 text-center"><div class="text-xl">${ic}</div><div class="text-xl font-black mt-1">${v}</div><div class="text-[10px] text-slate-400 mt-0.5">${lb}</div></div>`).join("")}
    </div>
    ${!has?`<div class="text-center py-10 text-slate-400 text-sm">${ln==="hi"?"MCQ solve karo — yahan analysis aayegi!":"Solve MCQs — analysis will appear here!"}</div>`:
    (Object.keys(weakMap).length?`<div class="text-xs font-bold text-red-500 mb-2">📉 ${ln==="hi"?"Kamzor Topics":"Weak Areas"}</div>${Object.entries(weakMap).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<div class="flex justify-between items-center bg-red-50 border border-red-100 rounded-xl p-3 mb-2 text-sm"><span>${c}</span><span class="text-xs font-bold text-red-600 bg-red-100 px-2 py-0.5 rounded">${n}×</span></div>`).join("")}`:"")
    +(Object.keys(strongMap).length?`<div class="text-xs font-bold text-green-600 mb-2 mt-4">📈 ${ln==="hi"?"Mazboot Topics":"Strong Areas"}</div>${Object.entries(strongMap).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<div class="flex justify-between items-center bg-green-50 border border-green-100 rounded-xl p-3 mb-2 text-sm"><span>${c}</span><span class="text-xs font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded">${n}×</span></div>`).join("")}`:"")
    }
  </div>`;
}

function renderPredictor(){
  const ln=l();
  return`<div class="flex-1 overflow-y-auto p-4">
    <div class="bg-blue-50 border border-blue-200 rounded-2xl p-4 mb-5">
      <div class="font-bold text-blue-700 text-sm mb-1">🔮 AI Exam Predictor</div>
      <div class="text-blue-600 text-xs leading-relaxed">${ln==="hi"?"Pichle 10 saalon ka pattern analyze karke predict karega":"Analyzes 10 years of patterns to predict important topics"}</div>
    </div>
    <div class="mb-5"><label class="text-xs font-semibold text-slate-600 block mb-2">Chapter</label>
    <select id="predSel" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm outline-none bg-white">${chs().map(c=>`<option value="${c}">${c}</option>`).join("")}</select></div>
    ${S.predErr?`<div class="bg-red-50 border border-red-200 rounded-xl p-3 mb-3 text-red-600 text-sm">${S.predErr}</div>`:""}
    ${S.predLoading
      ?`<div class="flex items-center justify-center py-8 gap-3"><div class="w-7 h-7 border-[3px] border-slate-200 border-t-slate-900 rounded-full spinner"></div><span class="text-sm">${ln==="hi"?"Predict ho raha hai...":"Predicting..."}</span></div>`
      :`<button onclick="runPredictor()" class="w-full py-3.5 bg-slate-900 text-white rounded-xl font-bold text-sm">🔮 ${ln==="hi"?"Predict Karein":"Run Predictor"}</button>`}
    ${S.prediction?`<div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 mt-4 text-sm leading-relaxed text-slate-900 whitespace-pre-wrap">${esc(S.prediction)}</div>`:""}
  </div>`;
}

function renderSettings(){
  const ln=l();
  return`<div class="flex-1 overflow-y-auto p-4">
    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Account</div>
    <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden mb-5">
      <div class="flex justify-between items-center px-4 py-3.5 border-b border-slate-50"><span class="text-sm">👤 User</span><span class="text-xs text-slate-400">${S.user?.email||"Guest"}</span></div>
      <div class="flex justify-between items-center px-4 py-3.5 border-b border-slate-50"><span class="text-sm">⭐ Plan</span><span class="text-xs font-semibold ${isPrem()?"text-blue-600":"text-slate-400"}">${isPrem()?`${S.profile?.plan||"pro"} PRO`:"Free"}</span></div>
      ${!isPrem()?`<button onclick="set({showPrem:true})" class="flex justify-between items-center px-4 py-3.5 w-full text-left border-b border-slate-50"><span class="text-sm">🚀 Upgrade</span><span class="text-xs text-blue-600">₹49/₹99/₹149 →</span></button>`:""}
      ${!S.user?`<button onclick="googleLogin()" class="flex justify-between items-center px-4 py-3.5 w-full text-left"><span class="text-sm">🔑 Login</span><span class="text-xs text-blue-600">Google →</span></button>`:""}
    </div>
    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Study</div>
    <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden mb-5">
      <div class="flex justify-between items-center px-4 py-3.5 border-b border-slate-50"><span class="text-sm">🏫 Board</span><span class="text-xs text-slate-400">${S.board==="bihar"?"Bihar Board":"CBSE"}</span></div>
      <div class="flex justify-between items-center px-4 py-3.5 border-b border-slate-50"><span class="text-sm">📚 Class</span><span class="text-xs text-slate-400">Class ${S.cls}</span></div>
      <div class="flex justify-between items-center px-4 py-3.5 border-b border-slate-50"><span class="text-sm">🌐 Medium</span><span class="text-xs text-slate-400">${S.medium==="hi"?"Hindi":"English"}</span></div>
      <button onclick="set({screen:'boardSelect'})" class="flex justify-between items-center px-4 py-3.5 w-full text-left"><span class="text-sm">🔄 ${ln==="hi"?"Board/Class Badlo":"Change Board/Class"}</span><span class="text-xs text-blue-600">→</span></button>
    </div>
    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Usage Today</div>
    <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden">
      ${[["💬 Chat","chat"],["📝 MCQ","mcq"],["📜 PYQ","pyq"],["🧪 Test","test"],["🔮 Predictor","predict"]].map(([lb,f])=>`<div class="flex justify-between items-center px-4 py-3.5 border-b border-slate-50 last:border-0">
        <span class="text-sm">${lb}</span>
        <span class="text-xs font-semibold ${usage(f)>=FREE[f]&&!isPrem()?"text-red-500":"text-slate-400"}">${usage(f)}/${FREE[f]}</span>
      </div>`).join("")}
    </div>
  </div>`;
}

// ── INIT ──
initAuth().then(()=>render());
</script>
</body>
</html>
